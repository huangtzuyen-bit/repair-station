<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小家電維修所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f3f6;
  --surface:#fff;
  --surface2:#f0f1f5;
  --border:#e3e5ee;
  --border2:#c9ccd8;
  --text:#111318;        /* 黑色 */
  --text2:#2c2f3a;       /* 深黑 */
  --text3:#3a3d4a;       /* 灰→深黑 */
  --accent:#2DC76D;      /* Grass Green from palette */
  --accent-dark:#1fa057;
  --accent-bg:#edfaf3;
  --shadow:0 1px 3px rgba(28,35,80,.07),0 1px 8px rgba(28,35,80,.04);
  --shadow-md:0 4px 18px rgba(28,35,80,.11);
  --tab-h:64px;
}
body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  font-size:16px;
  color:var(--text);
  min-height:100vh;
  padding-bottom:var(--tab-h);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ══ TOP BAR ══ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:8px 16px;
  display:flex;align-items:center;justify-content:flex-end;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
  min-height:52px;
}
.topbar-logo{display:flex;align-items:center;justify-content:flex-end;}
.topbar-logo-img{height:38px;width:auto;object-fit:contain;}

.sync-pill{
  display:flex;align-items:center;gap:5px;
  font-size:13px;color:var(--text2);
  padding:5px 12px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
}
.sdot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;animation:blink 2s infinite;}
.sdot.syncing{background:#f59e0b;animation:none;}
.sdot.err{background:#ef4444;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tbtn{
  width:34px;height:34px;font-size:16px;font-weight:600;
  border-radius:50%;
  cursor:pointer;font-family:inherit;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tbtn:active{transform:scale(.93);}

/* ══ PAGES ══ */
.page{display:none;}
.page.active{display:block;}

/* ══ BOTTOM TAB BAR ══ */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:60;
  box-shadow:0 -2px 12px rgba(28,35,80,.07);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .15s;
  color:var(--text2);font-size:12px;font-weight:500;
  border:none;background:none;font-family:inherit;
  padding:6px 0 4px;
}
.tab svg{width:22px;height:22px;transition:all .15s;}
.tab.active{color:var(--accent);}
.tab.active svg{stroke:var(--accent);}
.tab:active{opacity:.7;}

/* ══ REPAIR PAGE ══ */
.repair-header{
  padding:14px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:var(--surface);
}
.repair-header h1{font-size:22px;font-weight:900;color:var(--text);font-family:'Noto Sans TC',sans-serif;letter-spacing:-.01em;}
.repair-header-right{display:flex;align-items:center;gap:8px;}

.searchbar{
  background:var(--surface);border-bottom:0;
  padding:10px 14px 6px;
}
.sbox{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;
  padding:9px 16px;width:100%;
}
.sbox svg{width:14px;height:14px;color:var(--text2);flex-shrink:0;}
.sbox input{background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit;flex:1;}

.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 14px 10px;
  display:flex;flex-wrap:wrap;gap:6px;
}
.chip{
  padding:6px 14px;font-size:13px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;
}
.chip.on{color:#fff;border-color:transparent;}

.board-wrap{overflow-x:auto;padding:14px 14px 24px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;}

.col{width:220px;flex-shrink:0;display:flex;flex-direction:column;}
.col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-radius:10px 10px 0 0;
}
.cname{font-size:15px;font-weight:700;}
.ccnt{font-size:13px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(255,255,255,.28);}
.col-body{border-radius:0 0 11px 11px;padding:9px 7px 11px;flex:1;min-height:70px;display:flex;flex-direction:column;gap:7px;}

.kcard{
  background:var(--surface);border:1px solid rgba(0,0,0,.06);
  border-radius:10px;padding:11px 12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  transition:box-shadow .15s,transform .12s;
}
.kcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.11);transform:translateY(-2px);}
.kcard-inner{display:flex;align-items:center;gap:10px;}
.knum-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.k-product{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.k-name{font-size:14px;color:var(--text2);font-weight:500;}

/* ══ MODAL ══ */
.moverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,25,60,.45);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
}
@media(min-width:560px){.moverlay{align-items:center;padding:20px;}}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
}
@media(min-width:560px){.modal{border-radius:16px;max-width:520px;max-height:88vh;}}
.m-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;}
.m-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.m-num{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);}
.mclose{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.m-body{padding:0 0 36px;}
.msec{padding:16px 20px 2px;}
.msec-title{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;
}

/* 修改：兩欄式 Row，左標題右內容 */
.trow{display:grid;grid-template-columns:90px 1fr;align-items:start;gap:4px 12px;padding:8px 0;}
.tl{font-size:13px;color:var(--text2);font-weight:500;padding-top:2px;line-height:1.5;}
.tv{font-size:15px;color:var(--text);line-height:1.5;word-break:break-word;font-weight:500;}

/* 電話後3碼特定字體大小 */
#m-phone3 { font-size: 15px !important; }

.msel,.mta,.minput{
  width:100%;padding:11px 13px;font-size:15px;
  border:1px solid var(--border2);border-radius:10px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;
}
.mta{resize:vertical;min-height:72px;}
.save-btn-pill{
  display: block; margin: 20px auto;
  padding:12px 48px;font-size:15px;font-weight:700;
  background:var(--accent);color:#fff;border:none;
  border-radius:999px;cursor:pointer;
}

/* ══ INTERVIEW & STATS (Omitted for brevity, keeping structure) ══ */
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-logo">
    <img src="https://images.squarespace-cdn.com/content/v1/6334659618d3635748283626/89467645-055c-43d9-a720-30f14d87210e/LOGO-02.png" class="topbar-logo-img">
  </div>
</div>

<div id="p-repair" class="page active">
  <div class="repair-header">
    <h1>維修進度</h1>
    <div class="repair-header-right">
      <div class="sync-pill"><div class="sdot" id="sync-dot"></div><span id="sync-text">已同步</span></div>
      <button class="tbtn" onclick="refreshData()">↻</button>
    </div>
  </div>
  <div class="searchbar"><div class="sbox"><input type="text" id="searchInput" placeholder="搜尋姓名、電話、機型..." oninput="renderBoard()"></div></div>
  <div class="fbar" id="filterBar"></div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
</div>

<div id="modalOverlay" class="moverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="m-handle"></div>
    <div class="m-head">
      <div class="m-head-l">
        <span class="m-num" id="m-regNum">#0000</span>
        <select id="m-stage-select" class="m-quick-stage" onchange="updateStageFromModal()"></select>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="modalBody">
      <div class="msec">
        <div class="msec-title">客戶資料</div>
        <div class="trow"><div class="tl">姓名</div><div class="tv" id="m-name"></div></div>
        <div class="trow"><div class="tl">電話</div><div class="tv" id="m-phone"></div></div>
        <div class="trow"><div class="tl">電話後3碼</div><input type="text" id="m-phone3" class="minput"></div>
      </div>
      <div class="msec">
        <div class="msec-title">產品資訊</div>
        <div class="trow"><div class="tl">品項</div><div class="tv" id="m-item"></div></div>
        <div class="trow"><div class="tl">品牌機型</div><div class="tv" id="m-brand-model"></div></div>
        <div class="trow"><div class="tl">故障描述</div><div class="tv" id="m-fault"></div></div>
      </div>
      <div class="msec">
        <div class="msec-title">維修紀錄與費用</div>
        <div class="trow"><div class="tl">維修人員</div><input type="text" id="m-repairman" class="minput"></div>
        <div class="trow"><div class="tl">零件費用</div><input type="number" id="m-partCost" class="minput"></div>
        <div class="trow"><div class="tl">維修備註</div><textarea id="m-repairNote" class="mta"></textarea></div>
      </div>
      <button class="save-btn-pill" onclick="saveModalEdits()">儲存</button>
    </div>
  </div>
</div>

<nav class="tabbar">
  <button class="tab active">維修</button>
  <button class="tab">面談</button>
  <button class="tab">統計</button>
  <button class="tab">設定</button>
</nav>

<script>
let allCards = [];
const stgList = ['未報到','已報到等待維修','維修中','待領取','已領取','轉診或待確認'];
const stgColors = { '未報到':'#94a3b8', '已報到等待維修':'#f59e0b', '維修中':'#3b82f6', '待領取':'#8b5cf6', '已領取':'#2DC76D', '轉診或待確認':'#ef4444' };

function init() {
  // 模擬資料
  allCards = Array.from({length:8}, (_,i)=>({
    regNum: String(i+1).padStart(4,'0'),
    name: '客戶'+(i+1),
    phone: '0912345' + (100+i),
    phone3: '',
    item: '咖啡機',
    brand: 'Nespresso',
    model: 'D30',
    faultDesc: '無法過電',
    repairman: '',
    partCost: '',
    repairNote: '',
    stage: stgList[i%6]
  }));
  
  const sel = document.getElementById('m-stage-select');
  stgList.forEach(s=>{
    let opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
  
  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  stgList.forEach(stg => {
    const col = document.createElement('div');
    col.className = 'col';
    const cards = allCards.filter(c => c.stage === stg);
    col.innerHTML = `
      <div class="col-hd" style="background:${stgColors[stg]};color:#fff">
        <span class="cname">${stg}</span>
        <span class="ccnt">${cards.length}</span>
      </div>
      <div class="col-body"></div>
    `;
    const body = col.querySelector('.col-body');
    cards.forEach(c => {
      const cardEl = document.createElement('div');
      cardEl.className = 'kcard';
      cardEl.onclick = () => showCardDetails(c.regNum);
      cardEl.innerHTML = `
        <div class="kcard-inner">
          <div class="knum-circle" style="border:2px solid ${stgColors[stg]};color:${stgColors[stg]}">${c.regNum.slice(-2)}</div>
          <div class="kcard-info">
            <div class="k-product">${c.item}</div>
            <div class="k-name">${c.name}</div>
          </div>
        </div>
      `;
      body.appendChild(cardEl);
    });
    board.appendChild(col);
  });
}

let currentRegNum = null;
function showCardDetails(regNum) {
  const card = allCards.find(c => c.regNum === regNum);
  if(!card) return;
  currentRegNum = regNum;
  
  document.getElementById('m-regNum').textContent = '#' + card.regNum;
  document.getElementById('m-name').textContent = card.name;
  document.getElementById('m-phone').textContent = card.phone;
  
  // 修改：電話後3碼帶入資料邏輯
  const phoneVal = card.phone || '';
  document.getElementById('m-phone3').value = card.phone3 || phoneVal.slice(-3);
  
  document.getElementById('m-item').textContent = card.item;
  document.getElementById('m-brand-model').textContent = `${card.brand} / ${card.model}`;
  document.getElementById('m-fault').textContent = card.faultDesc;
  document.getElementById('m-repairman').value = card.repairman;
  document.getElementById('m-partCost').value = card.partCost;
  document.getElementById('m-repairNote').value = card.repairNote;
  document.getElementById('m-stage-select').value = card.stage;
  
  document.getElementById('modalOverlay').style.display = 'flex';
}

function saveModalEdits() {
  const card = allCards.find(c => c.regNum === currentRegNum);
  if(card) {
    card.phone3 = document.getElementById('m-phone3').value;
    card.repairman = document.getElementById('m-repairman').value;
    card.partCost = document.getElementById('m-partCost').value;
    card.repairNote = document.getElementById('m-repairNote').value;
    card.stage = document.getElementById('m-stage-select').value;
    renderBoard();
    closeModal();
    showToast("儲存成功");
  }
}

function updateStageFromModal() {
  // 自動同步階段
}

function closeModal(e) {
  document.getElementById('modalOverlay').style.display = 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
