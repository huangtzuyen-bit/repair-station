<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小家電維修所 · 維修追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f3f6;
  --surface:#ffffff;
  --surface2:#f0f1f5;
  --border:#e3e5ee;
  --border2:#c9ccd8;
  --text:#1c1e2e;
  --text2:#575b78;
  --text3:#9a9eb8;
  --accent:#2563eb;
  --accent-bg:#eef3ff;
  --shadow:0 1px 3px rgba(28,35,80,.07),0 1px 8px rgba(28,35,80,.04);
  --shadow-md:0 4px 18px rgba(28,35,80,.11);
}
body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  color:var(--text);min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}

/* ── NAV ── */
.nav{
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;
  overflow-x:auto;scrollbar-width:none;
  position:sticky;top:0;z-index:60;box-shadow:var(--shadow);
}
.nav::-webkit-scrollbar{display:none;}
.nav-brand{
  font-size:14px;font-weight:600;color:var(--accent);
  padding:14px 0;margin-right:18px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.nav-tab{
  padding:14px 13px;font-size:13px;font-weight:500;
  color:var(--text2);white-space:nowrap;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s;
}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sync-pill{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;
  padding:5px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);
}
.sdot{width:6px;height:6px;border-radius:50%;background:#10b981;flex-shrink:0;animation:blink 2s infinite;}
.sdot.syncing{background:#f59e0b;animation:none;}
.sdot.err{background:#ef4444;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

/* ── HEADER ── */
.header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:16px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.header h1{font-size:20px;font-weight:600;}
.header .sub{font-size:12px;color:var(--text3);margin-top:3px;}
.hbtns{display:flex;gap:8px;align-items:center;}
.btn{
  padding:7px 14px;font-size:12px;font-weight:500;border-radius:8px;
  cursor:pointer;font-family:inherit;transition:all .15s;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);
}
.btn:hover{background:var(--surface2);}
.btn.pri{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.pri:hover{background:#1d4ed8;}
.btn:active{transform:scale(.97);}

/* ── FILTER BAR ── */
.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 16px;display:flex;align-items:center;gap:7px;
  overflow-x:auto;scrollbar-width:none;
}
.fbar::-webkit-scrollbar{display:none;}
.chip{
  padding:5px 12px;font-size:12px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;
}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.chip:hover:not(.on){background:var(--surface2);}
.sbox{
  margin-left:auto;flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:6px 11px;
}
.sbox svg{width:13px;height:13px;color:var(--text3);flex-shrink:0;}
.sbox input{
  background:none;border:none;outline:none;
  font-size:13px;color:var(--text);font-family:inherit;width:120px;
}
.sbox input::placeholder{color:var(--text3);}

/* ── BOARD ── */
.board-wrap{overflow-x:auto;padding:16px 16px 32px;}
.board-wrap::-webkit-scrollbar{height:5px;}
.board-wrap::-webkit-scrollbar-track{background:var(--border);border-radius:10px;}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;}

.col{width:210px;flex-shrink:0;}
.col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:9px;margin-bottom:9px;
  border:1px solid transparent;
}
.col-hd-l{display:flex;align-items:center;gap:6px;}
.cdot{width:7px;height:7px;border-radius:50%;}
.cname{font-size:12px;font-weight:600;}
.ccnt{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:rgba(0,0,0,.07);}
.col-cards{display:flex;flex-direction:column;gap:7px;}

/* ── CARD ── */
.kcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid #ccc; /* overridden per stage */
  border-radius:11px;
  padding:11px 12px;
  cursor:pointer;
  box-shadow:var(--shadow);
  transition:box-shadow .15s,transform .15s,border-color .15s;
}
.kcard:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--border2);}
.kcard:active{transform:scale(.97);}

/* card layout: circle left + info right */
.kcard-inner{display:flex;align-items:flex-start;gap:10px;}

/* Circle avatar showing 編號 */
.knum-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;
  font-family:'DM Mono',monospace;
  border:2px solid;
}
.kcard-info{flex:1;min-width:0;}
/* End of 產品 – main product label */
.k-product{
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;
}
/* 電話後3碼 */
.k-phone{
  font-size:16px;font-weight:600;
  font-family:'DM Mono',monospace;
  letter-spacing:1.5px;color:var(--text);
  line-height:1;
}
/* 送修者姓名 */
.k-name{font-size:11px;color:var(--text3);margin-top:3px;}

.empty-col{
  border:1.5px dashed var(--border2);border-radius:11px;
  padding:20px 12px;text-align:center;font-size:12px;color:var(--text3);
}

/* ── MODAL ── */
.moverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,25,60,.45);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fdi .18s ease;
}
@media(min-width:560px){.moverlay{align-items:center;padding:20px;}}
@keyframes fdi{from{opacity:0}to{opacity:1}}

.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  animation:slu .22s cubic-bezier(.22,1,.36,1);
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
@media(min-width:560px){.modal{border-radius:16px;max-width:520px;max-height:88vh;}}
@keyframes slu{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}

.m-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;}
.m-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.m-head-l{display:flex;align-items:center;gap:10px;}
.m-num{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);}
.m-title{font-size:15px;font-weight:600;line-height:1.3;}
.mclose{
  width:28px;height:28px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.m-body{padding:16px 18px 28px;}

.ml{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.mv{font-size:13px;color:var(--text);}
.mv.hero{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;}
.mrow{margin-bottom:13px;}
.mdiv{border:none;border-top:1px solid var(--border);margin:14px 0;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;}

.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.pill-y{background:#ecfdf5;color:#059669;}
.pill-n{background:#f1f5f9;color:#64748b;}

.acc-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.acc-item{
  font-size:11px;padding:4px 10px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;
}
.acc-item.on{background:var(--accent-bg);border-color:#bfdbfe;color:var(--accent);}

.msel,.mta,.minput{
  width:100%;padding:9px 11px;font-size:13px;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);color:var(--text);
  font-family:inherit;margin-top:5px;outline:none;transition:border-color .15s;
}
.msel:focus,.mta:focus,.minput:focus{border-color:var(--accent);}
.mta{resize:vertical;min-height:64px;}

.save-btn{
  width:100%;padding:12px;font-size:14px;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:10px;
  cursor:pointer;font-family:inherit;margin-top:14px;transition:all .15s;
}
.save-btn:hover{background:#1d4ed8;}
.save-btn:active{transform:scale(.98);}
.save-btn:disabled{background:#94a3b8;cursor:not-allowed;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1c1e2e;color:#fff;font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:20px;z-index:500;
  opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ── LOADING BAR ── */
.lbar{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:var(--accent);z-index:999;
  transform:scaleX(0);transform-origin:left;transition:transform .3s ease;
}
.lbar.on{transform:scaleX(.75);}
.lbar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s .1s;}

/* stage palette */
.sp0{--sc:#64748b;--sbg:#f1f5f9;--sbr:#e2e8f0;--sd:#94a3b8;}
.sp1{--sc:#2563eb;--sbg:#eff4ff;--sbr:#bfdbfe;--sd:#3b82f6;}
.sp2{--sc:#d97706;--sbg:#fffbeb;--sbr:#fde68a;--sd:#f59e0b;}
.sp3{--sc:#7c3aed;--sbg:#f5f3ff;--sbr:#ddd6fe;--sd:#8b5cf6;}
.sp4{--sc:#059669;--sbg:#ecfdf5;--sbr:#a7f3d0;--sd:#10b981;}
.sp5{--sc:#db2777;--sbg:#fdf2f8;--sbr:#fbcfe8;--sd:#ec4899;}
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>
<div class="toast" id="toast"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-brand">🔧 小家電維修所</div>
  <div class="nav-tab active">維修看板</div>
  <div class="nav-tab">客戶管理</div>
  <div class="nav-tab">報表統計</div>
  <div class="sync-pill" id="sync-pill">
    <div class="sdot" id="sdot"></div>
    <span id="slbl">連線中…</span>
  </div>
</nav>

<!-- HEADER -->
<div class="header">
  <div>
    <h1 id="ttl">載入中…</h1>
    <div class="sub" id="sub-lbl">正在連接 Google Sheets…</div>
  </div>
  <div class="hbtns">
    <button class="btn" onclick="fetchData()">⟳ 重新整理</button>
  </div>
</div>

<!-- FILTER -->
<div class="fbar" id="fbar">
  <button class="chip on" onclick="setFilter('all',this)">全部</button>
  <!-- stage chips injected by JS -->
  <div class="sbox">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
    <input type="search" id="q" placeholder="姓名、電話、編號…" autocomplete="off">
  </div>
</div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board" id="board">
    <div style="padding:40px 0;color:var(--text3);font-size:14px;">正在讀取資料…</div>
  </div>
</div>

<!-- MODAL -->
<div class="moverlay" id="mov" style="display:none" onclick="closeBg(event)">
  <div class="modal">
    <div class="m-handle"></div>
    <div class="m-head">
      <div class="m-head-l">
        <div id="m-circle" class="knum-circle" style="width:36px;height:36px;font-size:11px;"></div>
        <div>
          <div id="m-num" class="m-num"></div>
          <div id="m-title" class="m-title"></div>
        </div>
      </div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="m-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// ★ 設定區：填入你的 GAS Web App URL
// ═══════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxREDKG37n6FACiFa3YsZa0giUDwkV1lRR_fpoi9YY7VJw0Y3vy8KfjV0Wp4hLu0Bc0/exec';
// ═══════════════════════════════════════════════════

// 流程階段（對應 Google Sheet「流程階段」欄位的實際文字）
const STAGES = [
  { key:'未報到',        ci:0 },
  { key:'已報到等待維修', ci:1 },
  { key:'維修中',        ci:2 },
  { key:'待領取',        ci:3 },
  { key:'已領取',        ci:4 },
  { key:'轉診或待確認',  ci:5 },
];
const STAGE_KEYS = STAGES.map(s=>s.key);

// Stage visual palette (light theme)
const PALETTE = [
  {sc:'#64748b',sbg:'#f1f5f9',sbr:'#e2e8f0',sd:'#94a3b8'},
  {sc:'#2563eb',sbg:'#eff4ff',sbr:'#bfdbfe',sd:'#3b82f6'},
  {sc:'#d97706',sbg:'#fffbeb',sbr:'#fde68a',sd:'#f59e0b'},
  {sc:'#7c3aed',sbg:'#f5f3ff',sbr:'#ddd6fe',sd:'#8b5cf6'},
  {sc:'#059669',sbg:'#ecfdf5',sbr:'#a7f3d0',sd:'#10b981'},
  {sc:'#db2777',sbg:'#fdf2f8',sbr:'#fbcfe8',sd:'#ec4899'},
];

// Avatar colors per 編號 hash
const AV_COLORS = ['#2563eb','#d97706','#059669','#7c3aed','#db2777','#0891b2','#65a30d','#9a3412'];

let allCards  = [];
let filterKey = 'all';
let searchQ   = '';
let refreshTimer = null;

// ─── map from GAS getData() response field names ───
// GAS returns: { id, name, phone, regNum, bigCat, item, subItem, itemNote,
//   endOfProduct, brand, model, opened, accessories, extraNote,
//   repairResult, repairResultDesc, repairNote, repairman, partCost, status }
//
// 實際 Sheet 欄位：
//   日期|流程階段|備註標籤|編號|送修者姓名|送件者電話|電話後3碼|產品分類|
//   產品品項|產品細項|產品備註|End of 產品|品牌|型號|配件|出廠日期|
//   產品價格|故障說明|維修_結果分類|維修_結果說明|維修_補充備註|
//   維修者|零件費|隨喜費|減碳貢獻
//
// GAS getData() 回傳欄位對應（依照你提供的 GAS 程式碼）：
//   status        ← 分類 (X欄) → 但我們的 Kanban 用「流程階段」
//   NOTE: GAS 原本的 getData 讀的是舊欄位，需要在下方做欄位映射調整
//
// ★ 由於 GAS getData() 是用 header 名稱動態找欄位，
//   實際上只要 GAS 的 col("欄位名") 有對應到 Sheet 的欄位名稱就會正確取得。
//   我們在前端用以下對應來使用 GAS 回傳的資料：

function mapCard(raw) {
  // raw 是 GAS getData() 回傳的每一筆物件
  // 依照你的 GAS script getData() 的 map 函數欄位對應：
  //   raw.id          = 編號
  //   raw.name        = 姓名  (GAS裡是"姓名", Sheet是"送修者姓名" → GAS需更新)
  //   raw.phone       = 電話  (GAS裡是"電話", Sheet是"送件者電話")
  //   raw.status      = 分類  → 但Kanban用「流程階段」(stage)
  //   raw.endOfProduct = End of 產品
  //
  // ★ 因為 GAS col() 是依 header 名稱搜尋，
  //   如果 Sheet 的 header 是「送修者姓名」但 GAS 找「姓名」→ 找不到
  //   前端在此做容錯，同時接受舊欄位名與新欄位名。

  return {
    // 識別
    id:         String(raw.id          || raw['編號']        || ''),
    // 卡片顯示三行
    endOfProduct: raw.endOfProduct     || raw['End of 產品']  || raw.item || '',
    phone3:     raw.phone3             || raw['電話後3碼']    || extractPhone3(String(raw.phone||'')),
    name:       raw.name               || raw['送修者姓名']   || raw['姓名'] || '',
    // 完整電話（撥打用）
    phone:      String(raw.phone       || raw['送件者電話']   || ''),
    // 掛號
    regNum:     raw.regNum             || raw['掛號號碼']     || raw.id || '',
    // 流程階段 → Kanban 欄位
    stage:      raw.stage              || raw['流程階段']     || raw.status || '未報到',
    // 備註標籤
    noteTag:    raw.noteTag            || raw['備註標籤']     || '',
    // 產品資訊
    bigCat:     raw.bigCat             || raw['家電大分類']   || raw['產品分類'] || '',
    item:       raw.item               || raw['產品品項']     || '',
    subItem:    raw.subItem            || raw['產品細項']     || '',
    itemNote:   raw.itemNote           || raw['產品備註']     || raw['備註說明'] || '',
    brand:      raw.brand              || raw['品牌']         || '',
    model:      raw.model              || raw['型號']         || '',
    accessories:raw.accessories        || raw['配件']         || '',
    mfgDate:    raw.mfgDate            || raw['出廠日期']     || '',
    price:      raw.price              || raw['產品價格']     || '',
    faultDesc:  raw.faultDesc          || raw['故障說明']     || '',
    opened:     raw.opened             || raw['是否拆過']     || '',
    extraNote:  raw.extraNote          || raw['其他備註']     || '',
    // 維修
    repairResult:     raw.repairResult     || raw['維修_結果分類']  || raw['維修結果']     || '',
    repairResultDesc: raw.repairResultDesc || raw['維修_結果說明']  || raw['維修結果說明']  || '',
    repairNote:       raw.repairNote       || raw['維修_補充備註']  || raw['當天修理狀況']  || '',
    repairman:        raw.repairman        || raw['維修者']        || '',
    partCost:         raw.partCost         || raw['零件費']        || '',
    donationFee:      raw.donationFee      || raw['隨喜費']        || '',
    ecoContrib:       raw.ecoContrib       || raw['減碳貢獻']      || '',
  };
}

function extractPhone3(phone){
  if(!phone)return'';
  const digits=phone.replace(/\D/g,'');
  return digits.length>=3?digits.slice(-3):digits;
}

// ── JSONP fetch via GAS ──
function fetchData(){
  setSyncState('syncing','同步中…');
  setLBar(true);
  const cbName='_gas_cb_'+Date.now();
  const script=document.createElement('script');
  script.src=GAS_URL+'?action=get&callback='+cbName+'&t='+Date.now();

  let done=false;
  window[cbName]=function(resp){
    done=true;
    document.head.removeChild(script);
    delete window[cbName];
    if(resp&&resp.data&&resp.data.length>0){
      allCards=resp.data.map(mapCard);
      render();
      const now=new Date();
      const hm=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
      setSyncState('ok','上次同步 '+hm);
      document.getElementById('sub-lbl').textContent='資料來源：Google Sheets · 共 '+allCards.length+' 筆工單';
    } else if(resp&&resp.error){
      setSyncState('err','GAS 錯誤：'+resp.error);
    } else {
      setSyncState('err','資料為空');
    }
    setLBar(false);
  };

  script.onerror=function(){
    if(!done){
      done=true;
      try{document.head.removeChild(script);}catch(e){}
      delete window[cbName];
      setSyncState('err','連線失敗 – 請確認 GAS_URL 設定');
      setLBar(false);
      showToast('⚠ 無法連線至 Google Sheets，請確認 GAS_URL');
      loadDemo();
    }
  };

  setTimeout(function(){
    if(!done){script.onerror();}
  },12000);

  document.head.appendChild(script);
}

// ── JSONP update via GAS ──
function gasUpdate(params, onOk, onErr){
  const cbName='_gas_upd_'+Date.now();
  const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
  const script=document.createElement('script');
  script.src=GAS_URL+'?action=update&callback='+cbName+'&'+qs;

  let done=false;
  window[cbName]=function(resp){
    done=true;
    try{document.head.removeChild(script);}catch(e){}
    delete window[cbName];
    if(resp&&resp.result==='success') onOk&&onOk(resp);
    else onErr&&onErr(resp);
  };
  script.onerror=function(){
    if(!done){done=true;try{document.head.removeChild(script);}catch(e){}delete window[cbName];onErr&&onErr();}
  };
  setTimeout(function(){if(!done)script.onerror();},10000);
  document.head.appendChild(script);
}

// ── RENDER ──
function stageInfo(key){
  const idx=STAGES.findIndex(s=>s.key===key);
  return {idx:idx<0?0:idx, p:PALETTE[idx<0?0:idx]};
}

function avColor(id){
  let h=0;for(let i=0;i<String(id).length;i++)h=(h*31+String(id).charCodeAt(i))|0;
  return AV_COLORS[Math.abs(h)%AV_COLORS.length];
}

function render(){
  const q=searchQ.toLowerCase();
  const filtered=allCards.filter(c=>{
    if(filterKey!=='all'&&c.stage!==filterKey)return false;
    if(q&&!(c.name.toLowerCase().includes(q)||c.phone.includes(q)||c.phone3.includes(q)||String(c.id).includes(q)||c.endOfProduct.toLowerCase().includes(q)))return false;
    return true;
  });

  document.getElementById('ttl').textContent=filtered.length+' 筆維修工單';

  // Inject stage filter chips (once)
  const fbar=document.getElementById('fbar');
  if(!fbar.dataset.built){
    fbar.dataset.built='1';
    const sbox=fbar.querySelector('.sbox');
    STAGES.forEach(s=>{
      const p=PALETTE[s.ci];
      const btn=document.createElement('button');
      btn.className='chip';
      btn.textContent=s.key;
      btn.onclick=function(){setFilter(s.key,this);};
      btn.style.setProperty('--ac',p.sd);
      fbar.insertBefore(btn,sbox);
    });
  }

  document.getElementById('board').innerHTML=STAGES.map(stage=>{
    const p=PALETTE[stage.ci];
    const sc=filtered.filter(c=>c.stage===stage.key);

    const cardsHtml=sc.length?sc.map(c=>{
      const col=avColor(c.id);
      const colBg=col+'1a';
      return `<div class="kcard" onclick="openModal('${escH(c.id)}')"
        style="border-left-color:${p.sd};">
        <div class="kcard-inner">
          <div class="knum-circle" style="background:${colBg};color:${col};border-color:${col}40;">
            ${escH(c.id)}
          </div>
          <div class="kcard-info">
            <div class="k-product">${escH(c.endOfProduct||c.item||'—')}</div>
            <div class="k-phone">${escH(c.phone3||'—')}</div>
            <div class="k-name">${escH(c.name||'—')}</div>
          </div>
        </div>
      </div>`;
    }).join(''):`<div class="empty-col">暫無工單</div>`;

    return `<div class="col">
      <div class="col-hd" style="background:${p.sbg};border-color:${p.sbr};">
        <div class="col-hd-l">
          <div class="cdot" style="background:${p.sd};"></div>
          <span class="cname" style="color:${p.sc};">${stage.key}</span>
        </div>
        <span class="ccnt" style="color:${p.sc};">${sc.length}</span>
      </div>
      <div class="col-cards">${cardsHtml}</div>
    </div>`;
  }).join('');
}

// ── MODAL ──
function openModal(id){
  const c=allCards.find(x=>String(x.id)===String(id));
  if(!c)return;
  const col=avColor(c.id);
  const si=stageInfo(c.stage);
  const p=si.p;

  // header circle
  const mc=document.getElementById('m-circle');
  mc.textContent=c.id;
  mc.style.background=col+'1a';mc.style.color=col;mc.style.borderColor=col+'50';
  document.getElementById('m-num').textContent='掛號 '+c.regNum;
  document.getElementById('m-title').textContent=(c.endOfProduct||c.item||'—')+' · '+c.name;

  // accessories as toggle chips
  const accList=c.accessories?c.accessories.split(/[,，、\s]+/).filter(Boolean):[];
  const accHtml=accList.length?accList.map(a=>`<span class="acc-item on" onclick="this.classList.toggle('on')" data-acc="${escH(a)}">${escH(a)}</span>`).join(''):'<span style="font-size:12px;color:var(--text3)">無</span>';

  // stage options
  const stageOpts=STAGES.map(s=>`<option value="${escH(s.key)}"${c.stage===s.key?' selected':''}>${s.key}</option>`).join('');

  const boolPill=(v)=>{
    const yes=['是','true','1','yes','有'].includes(String(v).toLowerCase());
    const no=['否','false','0','no','無'].includes(String(v).toLowerCase());
    if(yes)return`<span class="pill pill-y">✔ 是</span>`;
    if(no)return`<span class="pill pill-n">✘ 否</span>`;
    return`<span class="pill pill-n">${escH(v)||'—'}</span>`;
  };

  document.getElementById('m-body').innerHTML=`
    <div class="mrow"><div class="ml">掛號號碼</div><div class="mv hero">${escH(c.regNum||c.id)}</div></div>
    <hr class="mdiv">

    <div class="two">
      <div class="mrow"><div class="ml">送修者姓名</div><div class="mv">${escH(c.name||'—')}</div></div>
      <div class="mrow"><div class="ml">電話後3碼</div>
        <div class="mv" style="font-family:'DM Mono',monospace;font-size:20px;font-weight:600;">${escH(c.phone3||'—')}</div>
      </div>
    </div>
    ${c.phone?`<div class="mrow"><div class="ml">完整電話</div>
      <div class="mv"><a href="tel:${escH(c.phone)}" style="color:var(--accent);text-decoration:none;">📞 ${escH(c.phone)}</a></div>
    </div>`:''}

    <hr class="mdiv">
    <div class="two">
      <div class="mrow"><div class="ml">產品分類</div><div class="mv">${escH(c.bigCat||'—')}</div></div>
      <div class="mrow"><div class="ml">產品品項</div><div class="mv">${escH(c.item||'—')}</div></div>
    </div>
    <div class="two">
      <div class="mrow"><div class="ml">產品細項</div><div class="mv">${escH(c.subItem||'—')}</div></div>
      <div class="mrow"><div class="ml">End of 產品</div><div class="mv" style="font-weight:600;">${escH(c.endOfProduct||'—')}</div></div>
    </div>
    <div class="two">
      <div class="mrow"><div class="ml">品牌</div><div class="mv">${escH(c.brand||'—')}</div></div>
      <div class="mrow"><div class="ml">型號</div><div class="mv" style="font-family:'DM Mono',monospace;">${escH(c.model||'—')}</div></div>
    </div>
    <div class="three">
      <div class="mrow"><div class="ml">出廠日期</div><div class="mv">${escH(c.mfgDate||'—')}</div></div>
      <div class="mrow"><div class="ml">產品價格</div><div class="mv">${escH(c.price||'—')}</div></div>
      <div class="mrow"><div class="ml">是否拆過</div>${boolPill(c.opened)}</div>
    </div>
    <div class="mrow"><div class="ml">配件</div><div class="acc-wrap" id="acc-wrap-${escH(c.id)}">${accHtml}</div></div>
    <div class="mrow"><div class="ml">故障說明</div><div class="mv" style="color:var(--text2);font-size:13px;">${escH(c.faultDesc||'—')}</div></div>
    <div class="mrow"><div class="ml">產品備註</div><div class="mv" style="color:var(--text2);font-size:13px;">${escH(c.itemNote||'—')}</div></div>
    <div class="mrow"><div class="ml">備註標籤</div><div class="mv" style="color:var(--text2);font-size:13px;">${escH(c.noteTag||'—')}</div></div>

    <hr class="mdiv">
    <div class="two">
      <div class="mrow"><div class="ml">維修_結果分類</div>
        <input class="minput" id="mi-result-${escH(c.id)}" value="${escH(c.repairResult)}" placeholder="輸入結果分類">
      </div>
      <div class="mrow"><div class="ml">維修者</div>
        <input class="minput" id="mi-repairman-${escH(c.id)}" value="${escH(c.repairman)}" placeholder="維修者">
      </div>
    </div>
    <div class="mrow"><div class="ml">維修_結果說明</div>
      <textarea class="mta" id="mi-resdesc-${escH(c.id)}" placeholder="輸入結果說明…">${escH(c.repairResultDesc)}</textarea>
    </div>
    <div class="mrow"><div class="ml">維修_補充備註</div>
      <textarea class="mta" id="mi-repnote-${escH(c.id)}" placeholder="輸入補充備註…">${escH(c.repairNote)}</textarea>
    </div>
    <div class="three">
      <div class="mrow"><div class="ml">零件費</div>
        <input class="minput" id="mi-cost-${escH(c.id)}" value="${escH(String(c.partCost))}" placeholder="0">
      </div>
      <div class="mrow"><div class="ml">隨喜費</div>
        <input class="minput" id="mi-donation-${escH(c.id)}" value="${escH(String(c.donationFee))}" placeholder="0">
      </div>
      <div class="mrow"><div class="ml">減碳貢獻</div>
        <div class="mv">${escH(c.ecoContrib||'—')}</div>
      </div>
    </div>
    <div class="mrow"><div class="ml">其他備註</div>
      <textarea class="mta" id="mi-extra-${escH(c.id)}" placeholder="輸入其他備註…">${escH(c.extraNote)}</textarea>
    </div>

    <hr class="mdiv">
    <div class="mrow"><div class="ml">流程階段（Kanban 狀態）</div>
      <select class="msel" id="mi-stage-${escH(c.id)}">${stageOpts}</select>
    </div>
    <button class="save-btn" id="save-btn-${escH(c.id)}" onclick="saveCard('${escH(c.id)}')">儲存並同步至 Google Sheets</button>
  `;

  document.getElementById('mov').style.display='flex';
  document.body.style.overflow='hidden';
}

function saveCard(id){
  const c=allCards.find(x=>String(x.id)===String(id));
  if(!c)return;
  const btn=document.getElementById('save-btn-'+id);

  // collect acc
  const accWrap=document.getElementById('acc-wrap-'+id);
  const accOn=accWrap?[...accWrap.querySelectorAll('.acc-item.on')].map(el=>el.dataset.acc).join('、'):'';

  // collect fields
  const g=(eid)=>{const el=document.getElementById(eid);return el?el.value.trim():'';}

  const newStage=g('mi-stage-'+id)||c.stage;
  const newResult=g('mi-result-'+id);
  const newResDesc=g('mi-resdesc-'+id);
  const newRepNote=g('mi-repnote-'+id);
  const newCost=g('mi-cost-'+id);
  const newExtra=g('mi-extra-'+id);
  const newRepairman=g('mi-repairman-'+id);

  // update local
  c.stage=newStage;
  c.repairResult=newResult;
  c.repairResultDesc=newResDesc;
  c.repairNote=newRepNote;
  c.partCost=newCost;
  c.extraNote=newExtra;
  c.repairman=newRepairman;
  c.accessories=accOn||c.accessories;

  btn.disabled=true;btn.textContent='同步中…';

  // GAS update params — 對應 GAS updateRow() 的 writeIf 欄位
  const params={
    id: c.id,
    status: newStage,          // 分類 / 流程階段
    result: newResult,         // 維修結果 → GAS writeIf("維修結果","result")
    notes: newResDesc,         // 維修結果說明 → GAS writeIf("維修結果說明","notes")
    repairNote: newRepNote,    // 當天修理狀況 → GAS writeIf("當天修理狀況","repairNote")
    cost: newCost,             // 零件費
    extraNote: newExtra,       // 其他備註
    repairman: newRepairman,   // 維修者
    accessories: c.accessories,
  };

  gasUpdate(params,
    function(resp){
      btn.disabled=false;btn.textContent='儲存並同步至 Google Sheets';
      showToast('✓ 已成功同步至 Google Sheets（列 '+resp.row+'）');
      closeModal();render();
    },
    function(){
      btn.disabled=false;btn.textContent='儲存並同步至 Google Sheets';
      showToast('⚠ 本機已更新，但 Google Sheets 同步失敗');
      closeModal();render();
    }
  );
}

function closeModal(){document.getElementById('mov').style.display='none';document.body.style.overflow='';}
function closeBg(e){if(e.target===document.getElementById('mov'))closeModal();}

function setFilter(key,el){
  filterKey=key;
  document.querySelectorAll('.fbar .chip').forEach(b=>b.classList.remove('on'));
  if(el)el.classList.add('on');
  render();
}

function setSyncState(st,lbl){
  const d=document.getElementById('sdot');
  d.className='sdot'+(st==='syncing'?' syncing':st==='err'?' err':'');
  document.getElementById('slbl').textContent=lbl;
}
function setLBar(on){
  const b=document.getElementById('lbar');
  b.className='lbar'+(on?' on':' done');
  if(!on)setTimeout(()=>b.className='lbar',400);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Demo fallback
function loadDemo(){
  const names=['王小明','李美華','陳大偉','張雅婷','林志遠','吳佳穎','黃建國','劉淑芬'];
  const prods=['電風扇','吹風機','電鍋','果汁機','咖啡機','吸塵器','烤麵包機','電熨斗'];
  const brands=['Panasonic','LG','TECO','Hitachi','Sharp'];
  const r=a=>a[Math.floor(Math.random()*a.length)];
  allCards=Array.from({length:20},(_,i)=>({
    id:String(i+1).padStart(3,'0'),rowIndex:i+2,
    name:r(names),phone:'0912'+String(Math.floor(Math.random()*9000)+1000),
    phone3:String(Math.floor(Math.random()*900)+100),
    endOfProduct:r(prods),item:r(prods),subItem:'家用型',
    bigCat:r(['生活電器','廚房電器']),brand:r(brands),
    model:'M'+String(Math.floor(Math.random()*9000)+1000),
    accessories:'電源線、遙控器',mfgDate:'2020-01',price:'',
    faultDesc:'無法正常啟動',itemNote:'',noteTag:'',
    opened:Math.random()>.5?'是':'否',
    regNum:String(i+1).padStart(4,'0'),
    extraNote:'',repairResult:'',repairResultDesc:'',
    repairNote:'',repairman:'',partCost:'',donationFee:'',ecoContrib:'',
    stage:['未報到','已報到等待維修','維修中','待領取','已領取','轉診或待確認'][Math.floor(Math.random()*6)],
  }));
  document.getElementById('sub-lbl').textContent='⚠ 顯示示範資料（請設定 GAS_URL）';
  render();
}

// auto refresh every 30s
function startAuto(){
  clearInterval(refreshTimer);
  refreshTimer=setInterval(fetchData,30000);
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)fetchData();});
document.getElementById('q').addEventListener('input',function(){searchQ=this.value.trim();render();});

// init
if(GAS_URL&&GAS_URL.includes('script.google.com')){
  fetchData();
  startAuto();
} else {
  setSyncState('err','請設定 GAS_URL');
  document.getElementById('sub-lbl').textContent='請在程式碼中填入 GAS_URL';
  loadDemo();
}
</script>
