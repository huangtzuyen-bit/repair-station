<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小家電維修所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f3f6;
  --surface:#fff;
  --surface2:#f0f1f5;
  --border:#e3e5ee;
  --border2:#c9ccd8;
  --text:#111318;
  --text2:#2c2f3a;
  --text3:#3a3d4a;
  --accent:#2DC76D;
  --accent-dark:#1fa057;
  --accent-bg:#edfaf3;
  --shadow:0 1px 3px rgba(28,35,80,.07),0 1px 8px rgba(28,35,80,.04);
  --shadow-md:0 4px 18px rgba(28,35,80,.11);
  --tab-h:64px;
}
body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  font-size:16px;
  color:var(--text);
  min-height:100vh;
  padding-bottom:var(--tab-h);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ══ TOP BAR ══ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 16px 0 18px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
  min-height:64px;
}
.topbar-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.topbar-title{
  font-size:22px;font-weight:900;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'Noto Sans TC',sans-serif;line-height:1.2;
}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar-logo-img{height:48px;width:48px;object-fit:contain;border-radius:6px;}

.sync-pill{
  display:flex;align-items:center;
  padding:4px;border-radius:50%;
}
.sdot{width:9px;height:9px;border-radius:50%;background:#0dae42;flex-shrink:0;animation:blink 2s infinite;}
.sdot.syncing{background:#ffab2d;animation:pulse 1s infinite;}
.sdot.err{background:#ff6d48;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.tbtn{
  width:34px;height:34px;font-size:16px;font-weight:600;
  border-radius:50%;
  cursor:pointer;font-family:inherit;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tbtn:active{transform:scale(.93);}

/* ══ PAGES ══ */
.page{display:none;}
.page.active{display:block;}

/* ══ BOTTOM TAB BAR ══ */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:9999;
  box-shadow:0 -2px 12px rgba(28,35,80,.07);
  padding-bottom:env(safe-area-inset-bottom);
  isolation:isolate;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .15s;
  color:var(--text2);font-size:12px;font-weight:600;
  border:none;background:none;font-family:inherit;
  padding:6px 0 4px;
}
.tab svg{width:22px;height:22px;transition:all .15s;}
.tab.active{color:var(--accent);}
.tab.active svg{stroke:var(--accent);}
.tab:active{opacity:.7;}

/* ══ REPAIR PAGE ══ */

.searchbar{
  background:var(--surface);border-bottom:0;
  padding:10px 14px 6px;
}
.sbox{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;
  padding:9px 16px;width:100%;
}
.sbox svg{width:14px;height:14px;color:var(--text2);flex-shrink:0;}
.sbox input{background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit;flex:1;}
.sbox input::placeholder{color:var(--text2);}

.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 14px 10px;
  display:flex;flex-wrap:wrap;gap:6px;
}
.chip{
  padding:6px 14px;font-size:14px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;
}
.chip.on{color:#fff;border-color:transparent;}
.chip:hover:not(.on){background:var(--surface2);}

.board-wrap{overflow-x:auto;padding:14px 14px 24px;-webkit-overflow-scrolling:touch;}
.board-wrap::-webkit-scrollbar{height:5px;}
.board-wrap::-webkit-scrollbar-track{background:var(--border);border-radius:10px;}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;}

.col{width:220px;flex-shrink:0;display:flex;flex-direction:column;}
.col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-radius:10px 10px 0 0;
}
.cname{font-size:16px;font-weight:700;}
.ccnt{font-size:16px;font-weight:700;padding:2px 9px;border-radius:20px}
.col-body{padding:9px 7px 11px;flex:1;min-height:70px;display:flex;flex-direction:column;gap:7px;background:var(--surface2);}

.kcard{
  background:var(--surface);border:1px solid rgba(0,0,0,.06);
  border-radius:10px;padding:11px 12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  transition:box-shadow .15s,transform .12s;
}
.kcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.11);transform:translateY(-2px);}
.kcard:active{transform:scale(.97);}
.kcard-inner{display:flex;align-items:center;gap:10px;}
.knum-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.kcard-info{flex:1;min-width:0;}
.k-product{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.k-name{font-size:13px;color:var(--text2);font-weight:500;}
.k-tag{
  font-size:11px;color:var(--text3);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:5px;
}
.k-tag-chip{
  display:inline-block;padding:1px 6px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:10px;font-weight:600;color:var(--text2);
  white-space:nowrap;
}
.k-tag-chip.warn{background:#fff8ec;border-color:#ffab2d;color:#a06000;}
.k-tag-chip.info{background:#eaf7ff;border-color:#41bbff;color:#0068a0;}
/* 卡片計時器 */
.k-timer{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;font-family:'DM Mono',monospace;
  white-space:nowrap;
}
.k-timer.t-dim   {color:var(--text3);}
.k-timer.t-normal{color:var(--text);}
.k-timer.t-warn  {color:#ff6d48;}
.k-timer.t-alert {color:#c0391a;}
/* 時間計時器 */
.timer-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 0 4px;border-top:1px solid var(--border);margin-top:8px;
}
.timer-block{flex:1;text-align:center;}
.timer-label{font-size:11px;color:var(--text3);margin-bottom:2px;}
.timer-val{
  font-size:18px;font-weight:700;font-family:'DM Mono',monospace;
  color:var(--text);letter-spacing:.03em;
}
.timer-val.running{color:#ff6d48;}
.timer-val.done{color:#0dae42;}
.timer-val.pending{color:var(--text3);}
.timer-divider{width:1px;height:32px;background:var(--border);}
.empty-col{border-radius:9px;padding:18px 10px;text-align:center;font-size:12px;color:var(--text3);}

/* ══ MODAL ══ */
.moverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,25,60,.45);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fdi .18s ease;
}
@media(min-width:560px){.moverlay{align-items:center;padding:20px;}}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  animation:slu .22s cubic-bezier(.22,1,.36,1);
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
@media(min-width:560px){.modal{border-radius:16px;max-width:520px;max-height:88vh;}}
@keyframes slu{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal::-webkit-scrollbar{width:4px;}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.m-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;}
.m-head{
  padding:14px 16px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;box-shadow:var(--shadow);
}
.m-head-top{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-bottom:8px;
}
.m-head-l{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.m-head-r{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.m-num{font-size:12px;font-family:'DM Mono',monospace;color:var(--text3);}
.m-title{font-size:17px;font-weight:800;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* 備註標籤 複選 chips */
.notetag-wrap{display:flex;flex-wrap:wrap;gap:6px;padding-top:2px;}
.notetag-chip{
  display:inline-flex;align-items:center;
  padding:4px 10px;border-radius:20px;
  font-size:13px;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border2);
  background:var(--surface2);color:var(--text2);
  transition:all .15s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.notetag-chip.on{background:#fff8ec;border-color:#ffab2d;color:#a06000;}
.notetag-chip.on.nt-notified{background:#eaf7ff;border-color:#41bbff;color:#0068a0;}
.notetag-chip.on.nt-standby{background:#f0eeff;border-color:#7c63ec;color:#4a30b0;}
.notetag-chip.on.nt-special{background:#fff0ec;border-color:#ff6d48;color:#c0391a;}
/* 配件標籤 badge */
.m-acc-badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:20px;
  background:#fff8ec;border:1px solid #ffab2d;
  font-size:11px;font-weight:700;color:#a06000;
  flex-shrink:0;white-space:nowrap;
}
/* header 副標 — noteTag chips，對齊產品名稱 */
.m-head-sub{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  min-height:20px;
  padding-left:46px; /* 號碼圈 38px + gap 8px */
}
.m-tag-chip{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:600;white-space:nowrap;
  background:var(--surface2);border:1px solid var(--border);color:var(--text2);
}
.m-tag-chip.has-acc{background:#fff8ec;border-color:#ffab2d;color:#a06000;}
.m-tag-chip.notified{background:#eaf7ff;border-color:#41bbff;color:#0068a0;}
.m-tag-chip.standby{background:#f0eeff;border-color:#7c63ec;color:#4a30b0;}
.mclose{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.m-body{padding:0 0 36px;}

.m-hero-strip{
  padding:24px 20px 20px;
  border-radius:0;
}
.m-hero-id{font-size:32px;font-weight:700;font-family:'DM Mono',monospace;line-height:1;}

.m-quick-stage{
  font-size:13px;font-weight:600;
  border:1.5px solid var(--border2);border-radius:20px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;cursor:pointer;
  max-width:130px;
}

.msec{padding:16px 20px 2px;}

.msec-title{
  display:flex;align-items:center;justify-content:space-between;
  gap:7px;font-size:17px;font-weight:800;color:var(--text);
  margin-bottom:0;padding-bottom:8px;border-bottom:2px solid var(--border);
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
}
.msec-title-l{display:flex;align-items:center;gap:7px;}
.msec-chevron{
  font-size:12px;color:var(--text3);flex-shrink:0;
  transition:transform .22s ease;line-height:1;
}
.msec-chevron.open{transform:rotate(180deg);}
.msec-body{
  overflow:hidden;
  transition:max-height .25s ease, opacity .18s ease;
}
.msec-body.collapsed{max-height:0!important;opacity:0;pointer-events:none;}
.msec-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

.trow{display:grid;grid-template-columns:120px 1fr;align-items:start;gap:4px 0;padding:7px 0;}
.trow:last-child{}
.trow.edit{grid-template-columns:1fr;gap:5px;}

.tl{font-size:15px;color:var(--text);font-weight:700;padding-top:3px;line-height:1.5;padding-left:16px;text-transform:uppercase;}
.trow.edit .tl{font-size:15px;text-transform:uppercase;color:var(--text2);}

.tv{font-size:15px;color:var(--text);font-weight:500;padding-top:3px;line-height:1.5;padding-left:4px;}
.tv.bold{font-weight:700;}
.tv.mono{font-family:'DM Mono',monospace;}
.pill{display:inline-flex;align-items:center;font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;}
.pill-y{background:#ecfdf5;color:#065f46;}
.pill-n{background:#f1f5f9;color:#475569;}
.call-link{display:inline-flex;align-items:center;gap:5px;font-size:15px;color:var(--accent);text-decoration:none;font-weight:500;}
.acc-wrap{display:flex;flex-wrap:wrap;gap:6px;padding-top:3px;}
.acc-item{font-size:13px;padding:5px 12px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s;user-select:none;}
.acc-item.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:500;}
.note-text{font-size:15px;color:var(--text2);line-height:1.5;}
.mta, .minput {
  width: 100%;
  padding: 11px 13px;
}

.msel, .m-quick-stage {
  width: fit-content;
  min-width: 120px;
  max-width: 160px;
  padding: 8px 20px 8px 12px;
  font-size: 15px;
  border: 1px solid var(--border2);
  border-radius: 10px;
  background: var(--surface);
  cursor: pointer;
}
.msel:focus,.mta:focus,.minput:focus{border-color:var(--accent);}
.mta{resize:vertical;min-height:72px;}

.tv-edit{
  font-size:15px;color:var(--text);font-weight:500;padding:2px 4px;line-height:1.5;
  cursor:pointer;
  border-radius:4px;
  min-height:22px;display:inline-block;width:100%;box-sizing:border-box;
  padding-left:4px;
}
.tv-edit:hover{background:var(--surface2);}
.tv-edit:empty::before{content:'—';color:var(--text3);font-size:15px;}
.tv-edit[contenteditable="true"]{
  outline:none;
  background:var(--surface);
  border:1.5px solid var(--accent);
  border-radius:999px;
  color:var(--text);
  padding:4px 8px;
}

.msel-result{
  width:100%;padding:9px 10px;font-size:15px;
  border:1.5px solid var(--border2);border-radius:10px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;transition:border-color .15s;
  cursor:pointer;margin-top:4px;
}
.msel-result:focus{border-color:var(--accent);}
.two-inp{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.stage-select-wrap{display:none;}
.save-btn-pill{
  padding:12px 48px;font-size:15px;font-weight:700;
  background:var(--accent);color:#fff;border:none;
  border-radius:999px;
  cursor:pointer;font-family:inherit;transition:all .15s;
  box-shadow:0 3px 12px rgba(45,199,109,.3);
}
.save-btn-pill:hover{background:var(--accent-dark);}
.save-btn-pill:active{transform:scale(.97);}
.save-btn-pill:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none;}
.save-btn{
  display:block;width:100%;padding:13px;font-size:15px;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:12px;
  cursor:pointer;font-family:inherit;transition:all .15s;margin-top:11px;
}
.save-btn:hover{background:var(--accent-dark);}
.save-btn:active{transform:scale(.98);}
.save-btn:disabled{background:#94a3b8;cursor:not-allowed;}

/* ══ INTERVIEW / STATS / SETTINGS PAGES ══ */
.page-inner{padding:14px 16px;}
.card-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
.card-box h3{font-size:18px;font-weight:700;margin-bottom:14px;color:var(--text);}

.form-row{
  display:grid;grid-template-columns:100px 1fr;
  align-items:start;gap:10px 14px;
  margin-bottom:14px;
}
.form-row label{
  font-size:15px;font-weight:600;color:var(--text);
  padding-top:10px;line-height:1.5;
}
.form-row .form-sublabel{font-size:13px;color:var(--text3);font-weight:400;margin-top:2px;}
.form-inp,.form-ta,.form-sel{
  width:100%;padding:11px 15px;font-size:15px;
  border:1px solid var(--border2);border-radius:999px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;transition:border-color .15s;
}
.form-inp:focus,.form-ta:focus,.form-sel:focus{border-color:var(--accent);}
.form-ta{resize:vertical}
.match-list{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
.match-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:9px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all .15s;
}
.match-item:hover{border-color:var(--accent);background:var(--accent-bg);}
.match-item.selected{border-color:var(--accent);background:var(--accent-bg);}
.match-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;}
.match-info{flex:1;min-width:0;}
.match-info .mi-name{font-size:15px;font-weight:600;}
.match-info .mi-prod{font-size:13px;color:var(--text2);}
.match-check{font-size:16px;color:var(--accent);flex-shrink:0;}
.submit-btn{
  padding:13px 50px;font-size:15px;font-weight:700;
  background:var(--accent);color:#fff;border:none;border-radius:999px;
  cursor:pointer;font-family:inherit;transition:all .15s;
  box-shadow:0 4px 14px rgba(45,199,109,.3);
}
.submit-btn:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none;}
.submit-btn:active{transform:scale(.97);}
.interview-log{margin-top:14px;}
.ilog-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:10px;
  box-shadow:var(--shadow);
}
.ilog-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ilog-tag{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:3px 10px;border-radius:20px;}
.ilog-time{font-size:12px;color:var(--text3);}
.ilog-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;}
.ilog-prod{font-size:13px;color:var(--text2);margin-bottom:12px;}
.ilog-q{
  font-size:12px;font-weight:700;color:var(--text2);
  letter-spacing:.03em;margin-bottom:4px;margin-top:10px;
}
.ilog-q:first-of-type{margin-top:0;}
.ilog-a{font-size:15px;color:var(--text);margin-bottom:4px;line-height:1.6;}
.del-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;margin-top:8px;}
.del-btn:hover{color:#ff6d48;}
/* 訪問問題可編輯標籤 */
.iv-qlabel{
  font-size:15px;font-weight:600;color:var(--text);
  line-height:1.5;margin-bottom:6px;
  cursor:pointer;border-radius:6px;padding:2px 4px;
  transition:background .15s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.iv-qlabel:hover{background:var(--surface2);}
.iv-qlabel-hint{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px;}
.del-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;font-family:inherit;}
.del-btn:hover{color:#ef4444;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}
.empty-icon{font-size:36px;margin-bottom:10px;}

/* ══ SETTINGS PAGE ══ */
.settings-row{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.settings-row .sr-left{}
.sr-label{font-size:16px;font-weight:700;margin-bottom:3px;}
.sr-desc{font-size:12px;color:var(--text2);}

/* iOS-style toggle */
.toggle{position:relative;width:48px;height:28px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{
  position:absolute;inset:0;border-radius:28px;
  background:var(--border2);cursor:pointer;transition:.2s;
}
.slider::before{
  content:'';position:absolute;width:22px;height:22px;
  border-radius:50%;background:#fff;left:3px;top:3px;
  transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.15);
}
input:checked+.slider{background:var(--accent);}
input:checked+.slider::before{transform:translateX(20px);}

/* ══ STATS PAGE ══ */
.stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:16px;box-shadow:var(--shadow);
}
.stat-card-title{
  font-size:16px;font-weight:700;color:var(--text);
  letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:12px;
  display:flex;align-items:center;gap:6px;
}
.stat-card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px;}
.kpi-mini{text-align:center;}
.kpi-n{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.5PX;margin-bottom:2px;}
.kpi-l{font-size:11px;color:var(--text3);}

.stats-section{margin-bottom:14px;}
.stats-section h3{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:8px;}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center;box-shadow:var(--shadow);}
.metric-num{font-size:20px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;line-height:1;margin-bottom:3px;}
.metric-label{font-size:11px;color:var(--text3);}
.bar-list{display:flex;flex-direction:column;gap:7px;}
.bar-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 13px;}
.bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.bar-label{font-size:12px;font-weight:500;}
.bar-val{font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
.bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}

/* ══ GLOBAL UTILS ══ */
.lbar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:999;transform:scaleX(0);transform-origin:left;transition:transform .3s ease;}
.lbar.on{transform:scaleX(.75);}
.lbar.done{transform:scaleX(1);opacity:0;transition:transform .2s,opacity .3s .1s;}
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%);background:#1c1e2e;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}

/* ══ PHOTO SECTION ══ */
.photo-section{padding:4px 20px 8px;}
.photo-group{margin-bottom:16px;}
.photo-group-title{
  display:flex;align-items:center;gap:7px;
  font-size:17px;font-weight:800;color:var(--text);
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:2px solid var(--border);
}
.photo-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.photo-thumb-wrap{position:relative;width:72px;height:72px;border-radius:8px;overflow:hidden;border:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.photo-thumb-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;transition:opacity .15s;}
.photo-thumb-wrap img:hover{opacity:.85;}
.photo-del-btn{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(30,30,30,.7);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
/* 上傳狀態徽章 */
.photo-status{
  position:absolute;bottom:3px;left:3px;
  height:18px;min-width:18px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;padding:0 4px;gap:2px;
  pointer-events:none;
}
.photo-status.pending{background:rgba(0,0,0,.55);color:#ccc;}
.photo-status.uploading{background:rgba(255,171,45,.9);color:#fff;}
.photo-status.done{background:rgba(13,174,66,.92);color:#fff;}
.photo-status.fail{background:rgba(255,109,72,.9);color:#fff;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite;}
.photo-add-btn{width:72px;height:72px;border-radius:8px;border:1.5px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;color:var(--text2);font-size:11px;font-weight:500;flex-shrink:0;transition:all .15s;}
.photo-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.photo-add-btn svg{width:22px;height:22px;}
.photo-uploading{opacity:.5;pointer-events:none;}
/* lightbox */
.photo-lightbox{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;}
.photo-lightbox img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain;}
.photo-lightbox-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<!-- ═══ PAGE: REPAIR ═══ -->
<div class="page active" id="page-repair">
  <!-- 搜尋框 -->
  <div class="searchbar">
    <div class="sbox">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
      <input type="search" id="q" placeholder="搜尋姓名、編號、品項…" autocomplete="off">
    </div>
  </div>
  <!-- 階段篩選 -->
  <div class="fbar" id="fbar">
    <button class="chip on" id="chip-all" onclick="toggleAll(this)" style="background:var(--accent);color:#fff;">全部</button>
  </div>
  <div class="board-wrap">
    <div class="board" id="board">
      <div style="padding:40px;color:var(--text3);font-size:14px;">尚未載入資料，請至設定頁輸入 Google Sheet 資訊</div>
    </div>
  </div>
</div>

<!-- ═══ PAGE: INTERVIEW ═══ -->
<div class="page" id="page-interview">
  <!-- 搜尋框（與維修頁相同設計）-->
  <div class="searchbar">
    <div class="sbox">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
      <input type="text" id="iv-search" placeholder="搜尋送修者姓名、編號、品項…" oninput="ivSearch()" autocomplete="off">
    </div>
  </div>

  <div class="page-inner">
    <!-- 搜尋結果 -->
    <div class="match-list" id="iv-matches" style="margin-bottom:4px;"></div>

    <!-- 已選取送修者 -->
    <div id="iv-form-wrap">
      <div class="card-box" id="iv-selected-info" style="display:none;border-color:var(--accent);background:var(--accent-bg);margin-bottom:12px;">
        <div style="font-size:12px;color:var(--accent);font-weight:600;margin-bottom:5px;">✓ 已選取送修者</div>
        <div id="iv-selected-name" style="font-size:17px;font-weight:700;"></div>
        <div id="iv-selected-prod" style="font-size:14px;color:var(--text2);margin-top:3px;"></div>
      </div>

      <!-- 訪問問題（堆疊版，問題可長按編輯）-->
      <div class="card-box" id="iv-questions">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div class="stat-card-title" style="margin-bottom:0;">訪問問題</div>
          <div style="font-size:11px;color:var(--text3);">長按問句可編輯</div>
        </div>

        <!-- 問題 1 -->
        <div style="margin-bottom:14px;">
          <div class="iv-qlabel" id="iv-ql1"
            oncontextmenu="editQuestion(event,'iv-ql1'); return false;"
            ontouchstart="startLongPress(event,'iv-ql1')"
            ontouchend="cancelLongPress()"
            ontouchmove="cancelLongPress()">
            ➊ 是什麼時候購買的，當初花多錢呢？
          </div>
          <textarea class="form-ta" id="iv-q1" placeholder="請輸入回應…" rows="2" oninput="autoResize(this)"></textarea>
        </div>

        <!-- 問題 2 -->
        <div style="margin-bottom:16px;">
          <div class="iv-qlabel" id="iv-ql2"
            oncontextmenu="editQuestion(event,'iv-ql2'); return false;"
            ontouchstart="startLongPress(event,'iv-ql2')"
            ontouchend="cancelLongPress()"
            ontouchmove="cancelLongPress()">
            ➋ 為什麼想修而不是丟掉？這台小家電對您或家庭有什麼特別故事或意義呢？
          </div>
          <textarea class="form-ta" id="iv-q2" placeholder="請輸入回應…" rows="2" oninput="autoResize(this)"></textarea>
        </div>

        <div style="display:flex;justify-content:center;">
          <button class="submit-btn" id="iv-submit" onclick="submitInterview()" disabled>提交訪問記錄</button>
        </div>
      </div>
    </div>

    <!-- 訪問紀錄 -->
    <div class="interview-log" id="iv-log-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:15px;font-weight:700;color:var(--text);">訪問紀錄 <span id="iv-count" style="color:var(--text3);font-weight:400;font-size:13px;"></span></div>
        <button onclick="clearAllInterviews()" style="font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;">清除全部</button>
      </div>
      <div id="iv-log"></div>
    </div>
  </div>
</div>

<!-- ═══ PAGE: SETTINGS ═══ -->
<div class="page" id="page-settings">
  <div class="page-inner">

    <div class="card-box">
      <h3 style="margin-bottom:14px;">功能開關</h3>

      <div class="settings-row" style="border:none;padding:0 0 14px;margin-bottom:14px;">
        <div class="sr-left">
          <div class="sr-label">訪問功能</div>
          <div class="sr-desc">開啟後可在「訪問」頁記錄送修者意見</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-interview" checked onchange="saveSettings()">
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row" style="border:none;padding:0;">
        <div class="sr-left">
          <div class="sr-label">自動同步</div>
          <div class="sr-desc">每 30 秒自動從 Google Sheets 更新資料</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-autosync" checked onchange="saveSettings()">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card-box">
      <h3 style="margin-bottom:14px;">資料來源</h3>
      <div class="form-row">
        <label>Google Script URL</label>
        <input class="form-inp" id="gas-url-input" placeholder="https://script.google.com/macros/s/…/exec" oninput="saveSettings()">
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px;">修改後重新整理即生效</div>
    </div>

    <div class="card-box" style="background:var(--surface2);">
      <div style="font-size:12px;color:var(--text2);line-height:1.7;">
        <div style="font-weight:600;margin-bottom:6px;">版本資訊</div>
        小家電維修所 · 維修追蹤系統 v5<br>
        資料同步：Google Apps Script JSONP<br>
        本機訪問記錄：localStorage
      </div>
    </div>
  </div>
</div>

// ══ 時間戳管理 ══
// 以 rowNum 為 key 存入 localStorage
// tsReg: 填入掛號號碼時刻
// tsRepStart: 切換「維修中」時刻
// tsRepDone: 切換「待領取」時刻
function tsKey(rowNum){ return 'ts_' + rowNum; }
function getTs(rowNum){
  try{ return JSON.parse(localStorage.getItem(tsKey(rowNum))) || {}; }
  catch(e){ return {}; }
}
function setTs(rowNum, patch){
  const cur = getTs(rowNum);
  localStorage.setItem(tsKey(rowNum), JSON.stringify({...cur, ...patch}));
}
// 格式化毫秒差為 hh:mm
function fmtElapsed(ms){
  if(!ms || ms < 0) return '—';
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}
// 取得等候維修時間（已填號 → 維修中）
function getWaitDuration(rowNum){
  const ts = getTs(rowNum);
  if(!ts.tsReg) return null;
  const end = ts.tsRepStart || null;
  return end ? end - ts.tsReg : Date.now() - ts.tsReg;
}
// 取得維修過程時間（維修中 → 待領取）
function getRepairDuration(rowNum){
  const ts = getTs(rowNum);
  if(!ts.tsRepStart) return null;
  const end = ts.tsRepDone || null;
  return end ? end - ts.tsRepStart : Date.now() - ts.tsRepStart;
}
// 計時器狀態：pending / running / done / na
function getWaitState(c){
  const ts = getTs(c.rowNum);
  if(!ts.tsReg) return 'pending';
  if(ts.tsRepStart) return 'done';
  return 'running';
}
function getRepairState(c){
  const ts = getTs(c.rowNum);
  if(!ts.tsRepStart) return 'pending';
  if(ts.tsRepDone) return 'done';
  return 'running';
}

// HH:MM 字串轉成今天對應的毫秒時間戳（台灣時間）
function hhmmToMs(hhmm){
  if(!hhmm) return 0;
  const parts = String(hhmm).split(':');
  if(parts.length < 2) return 0;
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  if(isNaN(h)||isNaN(m)) return 0;
  const now = new Date();
  // 建立今天台灣時間 HH:MM 的 UTC timestamp
  const utcH = h - 8; // 台灣 UTC+8
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate(), utcH < 0 ? utcH + 24 : utcH, m, 0, 0));
  // 如果算出來比現在還晚，說明是昨天的時間
  if(d.getTime() > Date.now()) return d.getTime() - 86400000;
  return d.getTime();
}

// ══ 載入外部資料 ══
function loadExternalData(cards){
  allCards = cards.map(mapCard);
  // 把 Google Sheets 的時間點同步進 localStorage
  allCards.forEach(c=>{
    if(!c.rowNum) return;
    const cur = getTs(c.rowNum);
    const patch = {};
    // AA 欄是 HH:MM → 轉成今天的 timestamp
    if(c.waitStart){
      const sheetsMs = hhmmToMs(c.waitStart);
      if(sheetsMs && (!cur.tsReg || Math.abs(sheetsMs - cur.tsReg) > 5000)){
        patch.tsReg = sheetsMs;
      }
    }
    // AC 欄是 HH:MM → 轉成今天的 timestamp
    if(c.repStart){
      const sheetsMs = hhmmToMs(c.repStart);
      if(sheetsMs && (!cur.tsRepStart || Math.abs(sheetsMs - cur.tsRepStart) > 5000)){
        patch.tsRepStart = sheetsMs;
      }
    }
    if(Object.keys(patch).length) setTs(c.rowNum, patch);
  });
  buildStageChips();
  render();
  updateChipCounts();
  const now = new Date();
  setSyncState('ok', now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+' 同步');
}

function buildStageChips(){
  if(chipsBuilt)return;chipsBuilt=true;
  const fbar=document.getElementById('fbar');
  STAGES.forEach(s=>{
    const p=PALETTE[s.ci];
    const btn=document.createElement('button');
    btn.className='chip';btn.dataset.key=s.key;btn.dataset.ci=s.ci;
    btn.innerHTML=`${s.key} <span class="chip-cnt" style="opacity:.7;font-weight:700;">0</span>`;
    btn.onclick=function(){toggleStage(s.key,this);};
    fbar.appendChild(btn);
  });
  updateAllChip();
}
function updateChipCounts(){
  document.querySelectorAll('#fbar .chip[data-key]').forEach(btn=>{
    const key=btn.dataset.key;
    const cnt=allCards.filter(c=>c.stage===key).length;
    const span=btn.querySelector('.chip-cnt');
    if(span) span.textContent=cnt;
  });
  // 全部 chip 顯示總數
  const allBtn=document.getElementById('chip-all');
  if(allBtn){
    let span=allBtn.querySelector('.chip-cnt');
    if(!span){
      span=document.createElement('span');
      span.className='chip-cnt';
      span.style.opacity='.8';
      span.style.fontWeight='700';
      allBtn.appendChild(document.createTextNode(' '));
      allBtn.appendChild(span);
    }
    span.textContent=allCards.length;
  }
}
function toggleStage(key,el){
  if(activeKeys.has(key)){activeKeys.delete(key);el.classList.remove('on');el.style.background='';el.style.color='';}
  else{activeKeys.add(key);const p=PALETTE[parseInt(el.dataset.ci||'0')];el.classList.add('on');el.style.background=p.sbg;el.style.color='#fff';}
  updateAllChip();render();
}
function toggleAll(){
  activeKeys.clear();
  document.querySelectorAll('#fbar .chip[data-key]').forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  updateAllChip();render();
}
function updateAllChip(){
  const btn=document.getElementById('chip-all');if(!btn)return;
  if(activeKeys.size===0){btn.classList.add('on');btn.style.background='var(--accent)';btn.style.color='#fff';}
  else{btn.classList.remove('on');btn.style.background='';btn.style.color='';}
}

// ══ 卡片計時器（第三列）══
function buildCardTimer(c){
  // 只在特定階段顯示
  const ts = getTs(c.rowNum);
  let startMs = null;
  let label = '';

  if(c.stage === '等待維修'){
    startMs = ts.tsReg || null;
    label = '等候';
  } else if(c.stage === '維修中'){
    startMs = ts.tsRepStart || null;
    label = '維修';
  } else {
    return ''; // 其他階段不顯示計時
  }

  if(!startMs) return ''; // 尚無時間戳

  const elapsedMs  = Date.now() - startMs;
  const totalMin   = Math.floor(elapsedMs / 60000);
  const h          = Math.floor(totalMin / 60);
  const m          = totalMin % 60;
  const elapsedStr = h > 0 ? `${h}h${m}m` : `${totalMin}m`;

  // 開始時間格式 HH:MM
  const d        = new Date(startMs);
  const startStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');

  // 顏色級別
  let cls = 't-dim';
  if(totalMin >= 40)      cls = 't-alert';
  else if(totalMin >= 25) cls = 't-warn';
  else if(totalMin >= 15) cls = 't-normal';

  return `<span class="k-timer ${cls}">${startStr} (${elapsedStr})</span>`;
}

function openIdEdit(sid){
  document.getElementById('id-text-'+sid).style.display='none';
  const inp=document.getElementById('ei-id-'+sid);
  if(inp){inp.style.display='inline-block';inp.focus();inp.select();}
  markDirty(sid);
}
function closeIdEdit(sid){
  const inp=document.getElementById('ei-id-'+sid);
  const txt=document.getElementById('id-text-'+sid);
  if(inp&&txt){
    txt.textContent=inp.value||'—';
    inp.style.display='none';
    txt.style.display='';
  }
  markDirty(sid);
}

function startEdit(el){
  el.setAttribute('contenteditable','true');
  el.focus();
  const range=document.createRange();
  range.selectNodeContents(el);range.collapse(false);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
}
function stopEdit(el,sid){
  el.removeAttribute('contenteditable');
  markDirty(sid);
}
function markDirty(sid){
  const btn=document.getElementById('save-btn-'+sid);
  if(btn&&btn.disabled){btn.disabled=false;btn.textContent='儲存';}
}

function onResultChange(sid){
  const selResult=document.getElementById('mi-result-'+sid).value;
  const wrap=document.getElementById('sub-wrap-'+sid);
  if(!wrap)return;
  const opts=dropdownCache.subOpts[selResult]||[];
  if(!opts.length){wrap.innerHTML=`<select class="msel-result" id="mi-resdesc-${sid}" style="display:none;"></select>`;return;}
  wrap.innerHTML=`<select class="msel-result" id="mi-resdesc-${sid}" onchange="markDirty('${sid}')">${['', ...opts].map(o=>`<option value="${o}">${o||'— 選擇說明 —'}</option>`).join('')}</select>`;
}

function openCatSel(sid){

async function saveCard(id,sid){
  // sid 現在是 rowNum 字串，用它精準找卡片
  const rowNum = parseInt(sid);
  const c = allCards.find(x => x.rowNum === rowNum);
  if(!c) return;
  if(!c.rowNum || c.rowNum < 2){
    showToast('⚠️ 卡片缺少有效列號，無法儲存');
    return;
  }
  const btn=document.getElementById('save-btn-'+sid);
  const getEdit=eid=>{const el=document.getElementById(eid);return el?(el.innerText||el.textContent).trim():'';}
  const g=eid=>{const el=document.getElementById(eid);return el?el.value.trim():'';}
  const accWrap=document.getElementById('acc-'+sid);
  const accOn=accWrap?[...accWrap.querySelectorAll('.acc-item.on')].map(el=>el.dataset.acc).join('、'):'';
  const newId      = (()=>{const el=document.getElementById('ei-id-'+sid);return el?el.value.trim():c.id;})();
  const newName    = getEdit('ei-name-'+sid)     || c.name;
  const newPhone   = getEdit('ei-phone-'+sid)    || c.phone;
  const newModel   = getEdit('ei-model-'+sid)    || c.model;
  const newMfgDate = getEdit('ei-mfgdate-'+sid)  || c.mfgDate;
  const newFault   = getEdit('ei-fault-'+sid)    || c.faultDesc;
  const newRepNote = getEdit('ei-repnote-'+sid)  || c.repairNote;
  const newPartCost= getEdit('ei-partcost-'+sid) || c.partCost;
  const newAcc     = getEdit('ei-acc-'+sid)      || c.accessories;
  const newResult  = g('mi-result-'+sid)         || c.repairResult;
  const newResDesc = g('mi-resdesc-'+sid)        || c.repairResultDesc;
  const newBigCat  = g('mi-bigcat-'+sid)         || c.bigCat;
  const newItem    = g('mi-item-'+sid)           || c.item;
  const newNoteTag = getSelectedNoteTags(sid);
  // 計算新 stage
  let newStage = c.stage;
  if(newId && (!c.stage || c.stage === '未報到')) newStage = '等待維修';

  // 若是第一次填入掛號號碼，記錄等候開始時間
  if(newId && !c.id){
    if(!getTs(c.rowNum).tsReg) setTs(c.rowNum, { tsReg: Date.now() });
  }

  btn.disabled=true;
  btn.textContent='儲存中…';

  try {
    // 先上傳所有照片到 Drive
    if (newId) {
      btn.textContent='上傳照片…';
      await uploadAllPhotos(newId);
    }
    btn.textContent='同步資料…';

    const result = await gasPost({
      action: 'updateRow',
      rowNum: c.rowNum,
      fields: {
        id:              newId,
        name:            newName,
        phone:           newPhone,
        model:           newModel,
        mfgDate:         newMfgDate,
        faultDesc:       newFault,
        repairNote:      newRepNote,
        partCost:        newPartCost,
        repairResult:    newResult,
        repairResultDesc:newResDesc,
        bigCat:          newBigCat,
        item:            newItem,
        accessories:     newAcc,
        noteTag:         newNoteTag,
        stage:           newStage,
      }
    });

    if(result.error) throw new Error(result.error);

    // 更新本機
    c.id=newId; c.name=newName; c.phone=newPhone; c.model=newModel;
    c.mfgDate=newMfgDate; c.faultDesc=newFault; c.repairNote=newRepNote;
    c.partCost=newPartCost; c.repairResult=newResult; c.repairResultDesc=newResDesc;
    c.bigCat=newBigCat; c.item=newItem; c.stage=newStage; c.noteTag=newNoteTag;
    c.accessories=newAcc;
    c.regNum=newId;

    btn.textContent='✓ 已儲存';
    showToast('✓ 已同步至 Google Sheets');
    setTimeout(()=>{ closeModal(); render(); }, 700);
  } catch(err) {
    btn.disabled=false;
    btn.textContent='儲存';
    showToast('⚠️ 儲存失敗：' + err.message);
  }
}
function buildTimerHTML(c){
  const ws  = getWaitState(c);
  const rs  = getRepairState(c);
  const wd  = getWaitDuration(c.rowNum);
  const rd  = getRepairDuration(c.rowNum);
  const wVal = ws==='pending' ? '—' : fmtElapsed(wd);
  const rVal = rs==='pending' ? '—' : fmtElapsed(rd);
  const wCls = ws==='running'?'running':ws==='done'?'done':'pending';
  const rCls = rs==='running'?'running':rs==='done'?'done':'pending';
  return `
    <div class="timer-block">
      <div class="timer-label">等候維修</div>
      <div class="timer-val ${wCls}">${wVal}</div>
    </div>
    <div class="timer-divider"></div>
    <div class="timer-block">
      <div class="timer-label">維修過程</div>
      <div class="timer-val ${rCls}">${rVal}</div>
    </div>`;
}
function refreshTimerDisplay(rowNum){
  const c = allCards.find(x=>x.rowNum===rowNum);
  if(!c) return;
  const sid = String(rowNum);
  const el = document.getElementById('timer-row-'+sid);
  if(el) el.innerHTML = buildTimerHTML(c);
}

function toggleMsec(titleEl){
  const body = titleEl.nextElementSibling;
  const chev = titleEl.querySelector('.msec-chevron');
  const isOpen = !body.classList.contains('collapsed');
  if(isOpen){
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(()=>{
      body.style.maxHeight = '0';
      body.classList.add('collapsed');
    });
    chev.classList.remove('open');

async function quickStageChange(newStage){
  const saveBtnEl=document.querySelector('[id^="save-btn-"]');
  if(!saveBtnEl)return;
  const sid=saveBtnEl.id.replace('save-btn-','');
  const rowNum=parseInt(sid);
  const c=allCards.find(x=>x.rowNum===rowNum);
  if(!c)return;
  const ci=STAGES.findIndex(s=>s.key===newStage);
  const p=PALETTE[ci<0?0:ci];
  const qs=document.getElementById('m-quick-stage');
  if(qs){qs.style.borderColor=p.sbg;qs.style.color=p.circleColor;}
  const oldStage=c.stage;
  c.stage=newStage;

  // ── 時間戳記錄 ──
  const now = Date.now();
  const postExtra = {};   // 附帶寫入 GAS 的時間欄位

  if(newStage === '維修中'){
    const patch = { tsRepStart: now };
    if(!getTs(c.rowNum).tsReg) patch.tsReg = now;
    setTs(c.rowNum, patch);
    // 等候維修時間確定 → 寫入 AA 欄
    const ts = getTs(c.rowNum);
    if(ts.tsReg){
      postExtra.waitMin = Math.floor((now - ts.tsReg) / 60000);
    }
  }
  if(newStage === '待領取' || newStage === '已領取' || newStage === '取消/轉診/退回'){
    const tsCur = getTs(c.rowNum);
    if(newStage === '待領取' && tsCur.tsRepStart && !tsCur.tsRepDone){
      setTs(c.rowNum, { tsRepDone: now });
    }
    // 維修過程時間確定 → 寫入 AB 欄（切換到待領取時）
    if(newStage === '待領取'){
      const tsAfter = getTs(c.rowNum);
      if(tsAfter.tsRepStart){
        postExtra.repairMin = Math.floor((now - tsAfter.tsRepStart) / 60000);
      }
    }
  }

  render();
  refreshTimerDisplay(rowNum);
  try {
    const extra = { action:'updateStage', rowNum:c.rowNum, stage:newStage, ...postExtra };
    // 把時間點也傳給 GAS 存入 AA/AC
    const tsNow = getTs(c.rowNum);
    if(newStage === '等待維修' && tsNow.tsReg){
      extra.waitStart = new Date(tsNow.tsReg).toISOString();
    }
    if(newStage === '維修中' && tsNow.tsRepStart){
      extra.repStart = new Date(tsNow.tsRepStart).toISOString();
    }
    await gasPost(extra);
    showToast('✓ 階段已同步');
  } catch(err) {
    c.stage=oldStage;
    showToast('⚠️ 階段更新失敗');
    render();
  }
}

// ══ Treemap（矩形樹狀圖）══
function buildTreemap(items){
  const COLORS = ['#ff6d48','#ffab2d','#0dae42','#41bbff','#7c63ec','#2e2e2e','#ff6d48','#ffab2d','#0dae42','#41bbff'];
  const totalVal = items.reduce((s,[,v])=>s+v, 0);
  if(!totalVal) return '';

  // Squarified treemap — 簡化版：按比例分配行高，每行內水平切分
  const HEIGHT = 160; // px，固定總高度
  const rows = [];
  let remaining = [...items.map(([k,v],i)=>({k,v,i}))];

  // 貪婪分行：每行盡量讓長寬比接近 1
  function layoutRow(rowItems, rowH, yOffset){
    const rowTotal = rowItems.reduce((s,x)=>s+x.v,0);
    let x = 0;
    return rowItems.map((item,ri)=>{
      const w = Math.round(item.v / rowTotal * 100);
      const cell = {k:item.k, v:item.v, i:item.i, x, w, y:yOffset, h:rowH};
      x += w;
      return cell;
    });
  }

  // 簡單兩行分法：先算每格面積比，前半放第一行，後半放第二行
  // 按面積排序後，找最佳切分點讓兩行面積接近 50/50
  const sorted = [...items.map(([k,v],i)=>({k,v,i}))].sort((a,b)=>b.v-a.v);
  let cumSum = 0, splitIdx = 0;
  for(let i=0;i<sorted.length;i++){
    cumSum += sorted[i].v;
    if(cumSum >= totalVal/2){ splitIdx=i+1; break; }
  }
  // 至少各一個
  if(splitIdx === 0) splitIdx = 1;
  if(splitIdx >= sorted.length) splitIdx = sorted.length - 1;

  const row1Items = sorted.slice(0, splitIdx);
  const row2Items = sorted.slice(splitIdx);

  const row1Total = row1Items.reduce((s,x)=>s+x.v,0);
  const row2Total = row2Items.reduce((s,x)=>s+x.v,0);
  const row1H = row2Total > 0 ? Math.round(row1Total / totalVal * HEIGHT) : HEIGHT;
  const row2H = HEIGHT - row1H;

  const cells = [
    ...layoutRow(row1Items, row1H, 0),
    ...(row2Items.length > 0 ? layoutRow(row2Items, row2H, row1H) : [])
  ];

  return `<div style="position:relative;height:${HEIGHT}px;display:flex;flex-direction:column;gap:2px;border-radius:8px;overflow:hidden;">
    <div style="display:flex;gap:2px;height:${row1H}px;flex-shrink:0;">
      ${cells.filter(c=>c.y===0).map(c=>`
        <div style="flex:${c.v};background:${COLORS[c.i%COLORS.length]};border-radius:4px;padding:7px 8px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;min-width:0;position:relative;">
          <div style="font-size:${c.v/totalVal>0.15?13:11}px;font-weight:700;color:rgba(255,255,255,.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escH(c.k)}</div>
          <div style="font-size:${c.v/totalVal>0.15?18:13}px;font-weight:800;color:#fff;font-family:'DM Mono',monospace;line-height:1.2;">${c.v}</div>
        </div>`).join('')}
    </div>
    ${row2Items.length>0?`<div style="display:flex;gap:2px;height:${row2H}px;flex-shrink:0;">
      ${cells.filter(c=>c.y!==0).map(c=>`
        <div style="flex:${c.v};background:${COLORS[c.i%COLORS.length]};border-radius:4px;padding:7px 8px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;min-width:0;">
          <div style="font-size:${c.v/totalVal>0.15?13:11}px;font-weight:700;color:rgba(255,255,255,.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escH(c.k)}</div>
          <div style="font-size:${c.v/totalVal>0.15?18:13}px;font-weight:800;color:#fff;font-family:'DM Mono',monospace;line-height:1.2;">${c.v}</div>
        </div>`).join('')}
    </div>`:''}
  </div>`;
}

         palette:['#7c63ec','#a394f5','#cec7fb','#c8c8c8']},
      ];

      function buildDonut(descList, cnt, totalAll, g){
        const R=42, cx=52, cy=52;
        const circ=2*Math.PI*R;
        const pctAll=Math.round(cnt/totalAll*100);
        if(!descList.length) return '';
        let paths='', offset=0;
        descList.forEach(([k,v],i)=>{
          const color=i<3?g.palette[i]:g.palette[3];
          const arcLen=circ*(v/cnt);
          const gapLen=Math.min(circ*0.008, arcLen*0.1);
          const drawLen=Math.max(0, arcLen-gapLen);
          paths+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${color}" stroke-width="18"
            stroke-dasharray="${drawLen} ${circ-drawLen}"
            stroke-dashoffset="${circ*0.25-offset}"
            stroke-linecap="butt"/>`;
          offset+=arcLen;
        });
        return `<svg viewBox="0 0 104 104" width="104" height="104" style="flex-shrink:0;">
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="var(--surface2)" stroke-width="18"/>
          ${paths}
          <text x="${cx}" y="${cy-7}" text-anchor="middle" dominant-baseline="central"
            font-size="18" font-weight="800" fill="${g.accent}" font-family="DM Mono,monospace">${cnt}</text>
          <text x="${cx}" y="${cy+10}" text-anchor="middle" dominant-baseline="central"
            font-size="10" font-weight="600" fill="${g.accent}" font-family="DM Mono,monospace">${pctAll}%</text>
        </svg>`;
      }

      return groups.map(g=>{
        const members=allCards.filter(c=>c.repairResult===g.key);
        const cnt=members.length;
        if(!cnt) return '';
        const descMap={};
        members.forEach(c=>{const k=(c.repairResultDesc||'（未填）').replace(/^(OK|No)\s*/,'').trim();descMap[k]=(descMap[k]||0)+1;});
        const descList=Object.entries(descMap).sort((a,b)=>b[1]-a[1]);

        const legend=descList.map(([k,v],i)=>{
          const color=i<3?g.palette[i]:g.palette[3];
          const p2=Math.round(v/cnt*100);
          return `<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);">
            <div style="width:9px;height:9px;border-radius:2px;background:${color};flex-shrink:0;"></div>
            <div style="flex:1;font-size:12px;color:var(--text2);min-width:0;">${escH(k)}</div>
            <div style="font-size:12px;font-weight:700;color:${color};font-family:'DM Mono',monospace;flex-shrink:0;white-space:nowrap;">${v} <span style="font-weight:400;color:var(--text3);">(${p2}%)</span></div>
          </div>`;
        }).join('');

        return `<div style="margin-bottom:18px;padding-bottom:4px;border-bottom:2px solid var(--border);">
          <div style="font-size:13px;font-weight:700;color:${g.accent};margin-bottom:10px;">${g.label}</div>
          <div style="display:flex;gap:14px;align-items:flex-start;">
            ${buildDonut(descList,cnt,total,g)}
            <div style="flex:1;min-width:0;">${legend}</div>
          </div>
        </div>`;
      }).join('');
    })()}
  </div>

  <!-- 第四區塊：送修家電分類 -->
  ${catList.length?`<div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">送修家電分類</div>
    ${colChart(catList.slice(0,7),maxCat,()=>'#41bbff')}
  </div>`:''}

  <!-- 第五區塊：送修品項分析 -->
  ${itemList.length?`<div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">送修品項分析</div>
    <div id="treemap-wrap" style="margin-top:8px;">${buildTreemap(itemList)}</div>
  </div>`:''}

  <!-- 第六區塊：訪問關鍵字雲 -->
  <div class="stat-card" style="margin-bottom:12px;">
    <div class="stat-card-title">訪問關鍵字雲</div>
    ${wordList.length?`
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 0;line-height:1.8;">
      ${wordList.map(([w,c])=>{
        const sz=Math.round(14+((c-1)/(maxW||1))*18);
        const op=0.55+0.45*(c/maxW);
        const colors=['#ff6d48','#0dae42','#ffab2d','#7c63ec','#41bbff','#2e2e2e'];
        const col=colors[Math.abs(w.charCodeAt(0))%colors.length];
        return`<span style="font-size:${sz}px;font-weight:${c>1?700:500};color:${col};opacity:${op.toFixed(2)};cursor:default;" title="${c}次">${escH(w)}</span>`;
      }).join('')}
    </div>
    <div style="font-size:12px;color:var(--text3);margin-top:4px;">共 ${ivTotal} 筆訪問・${Object.keys(wordMap).length} 個關鍵詞</div>
    `:`<div style="text-align:center;padding:24px 0;font-size:14px;color:var(--text3);">尚無訪問資料</div>`}
  </div>
  `;}

// ══ 照片 ══
const photoCache = {};
function getPhotoCacheKey(sid, zone){ return sid + '__' + zone; }

// 照片 metadata 持久化（只存 fileUrl/fileId，不存 base64）
function savePhotoMeta(sid, zone){
  const key = getPhotoCacheKey(sid, zone);
  const photos = (photoCache[key]||[]).map(p=>({
    status:  p.status,
    fileId:  p.fileId  || '',
    fileUrl: p.fileUrl || '',
    name:    p.name    || '',
  }));
  try{ localStorage.setItem('pm_'+key, JSON.stringify(photos)); }catch(e){}
}
function loadPhotoMeta(sid, zone){
  const key = getPhotoCacheKey(sid, zone);
  try{
    const saved = JSON.parse(localStorage.getItem('pm_'+key)||'[]');
    // 還原為只有 metadata 的 entry（無 dataUrl/file，縮圖改用 fileUrl 顯示）
    if(!photoCache[key]) photoCache[key] = [];
    saved.forEach((m,i)=>{
      if(!photoCache[key][i]){
        photoCache[key][i] = { dataUrl: '', file: null, status: m.status, fileId: m.fileId, fileUrl: m.fileUrl, name: m.name };
      }
    });
  }catch(e){}
}
function buildPhotoSection(c, sid, zone, maxCount){
  const key = getPhotoCacheKey(sid, zone);
  if(!photoCache[key]) photoCache[key] = [];
  // 讀取持久化的照片 metadata
  loadPhotoMeta(sid, zone);
  const photos = photoCache[key];
  const thumbsHtml = photos.map((p, i) => {
    // 已上傳用 Drive 預覽連結，否則用 base64
    const imgSrc = (p.status==='done' && p.fileId)
      ? `https://drive.google.com/thumbnail?id=${p.fileId}&sz=w200`
      : (p.dataUrl || '');
    const clickAction = (p.status==='done' && p.fileUrl)
      ? `window.open('${p.fileUrl}','_blank')`
      : (p.dataUrl ? `openLightbox('${p.dataUrl}')` : '');
    return `<div class="photo-thumb-wrap" id="pt-${escH(sid)}-${zone}-${i}">
      ${imgSrc ? `<img src="${imgSrc}" onclick="${clickAction}" style="cursor:pointer;">` : '<div style="width:100%;height:100%;background:var(--surface2);"></div>'}
      ${p.status!=='uploading'?`<button class="photo-del-btn" onclick="deletePhoto('${escH(sid)}','${zone}',${i})" title="刪除">×</button>`:''}
      ${photoStatusBadge(p)}
    </div>`;
  }).join('');
  const canAdd = photos.length < maxCount;
  const addBtn = canAdd ? `
    <div class="photo-add-btn" onclick="triggerPhotoInput('${escH(sid)}','${zone}',${maxCount})" title="新增照片（相簿或相機）">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M20.5 7H18l-2-3H8L6 7H3.5A1.5 1.5 0 002 8.5v11A1.5 1.5 0 003.5 21h17a1.5 1.5 0 001.5-1.5v-11A1.5 1.5 0 0020.5 7z"/></svg>
      <span>照片${zone}</span>
    </div>` : '';
  return `<div class="photo-group">
    <div class="photo-group-title">照片${zone}</div>
    <div class="photo-thumbs" id="photo-thumbs-${escH(sid)}-${zone}">
      ${thumbsHtml}${addBtn}
    </div>
  </div>`;
}
// 壓縮圖片到最長邊 1200px，JPEG 品質 0.82
function compressImage(file, callback){
  const MAX = 780, Q = 0.82;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      let w = img.width, h = img.height;
      if(w > MAX || h > MAX){
        if(w > h){ h = Math.round(h * MAX / w); w = MAX; }
        else      { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', Q);
      callback(dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function triggerPhotoInput(sid, zone, maxCount){
  const key = getPhotoCacheKey(sid, zone);
  if(!photoCache[key]) photoCache[key] = [];
  if(photoCache[key].length >= maxCount){ showToast('最多 '+maxCount+' 張'); return; }
  // 取得目前卡片 id（sid 是 rowNum）
  const c = allCards.find(x => x.rowNum === parseInt(sid));
  const cardId = c ? (c.id || '') : '';

  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.capture = 'environment';
  inp.onchange = async function(){
    if(!inp.files || !inp.files[0]) return;
    const file = inp.files[0];
    const idx = photoCache[key].length;
    // 先加入 pending 縮圖讓使用者看到預覽
    const placeholderUrl = URL.createObjectURL(file);
    const entry = { dataUrl: placeholderUrl, file, status:'pending' };
    photoCache[key].push(entry);
    refreshPhotoThumbs(sid, zone, maxCount);

    // 壓縮
    compressImage(file, async function(compressedDataUrl){
      entry.dataUrl = compressedDataUrl;
      refreshPhotoThumbs(sid, zone, maxCount);

      if(!cardId){
        showToast('📷 照片已暫存，請先填入掛號號碼再儲存');
        return;
      }
      // 立即上傳
      entry.status = 'uploading';
      refreshPhotoThumbs(sid, zone, maxCount);
      try {
        const r = await uploadPhotoToGAS(cardId, zone, idx, file, compressedDataUrl);
        if(r && (r.success || r.fileId)){
          entry.status  = 'done';
          entry.fileId  = r.fileId || '';
          entry.fileUrl = r.fileUrl || '';
          savePhotoMeta(sid, zone); // 持久化到 localStorage
          showToast('✓ 照片已上傳');
        } else {
          entry.status = 'fail';
          const errMsg = r && r.error ? r.error : '回傳格式異常';
          showToast('⚠️ ' + errMsg);
        }
      } catch(e){
        entry.status = 'fail';
        showToast('catch錯誤:' + e.message.slice(0,80));
      }
      refreshPhotoThumbs(sid, zone, maxCount);
    });
  };
  inp.click();
}

function photoStatusBadge(p){
  if(p.status==='done')     return `<div class="photo-status done">✓ 已上傳</div>`;
  if(p.status==='uploading')return `<div class="photo-status uploading"><span class="spin">↻</span> 上傳中</div>`;
  if(p.status==='fail')     return `<div class="photo-status fail">✗ 失敗</div>`;
  return `<div class="photo-status pending">待上傳</div>`;
}

function refreshPhotoThumbs(sid, zone, maxCount){
  const key = getPhotoCacheKey(sid, zone);
  const photos = photoCache[key] || [];
  const container = document.getElementById('photo-thumbs-'+sid+'-'+zone);
  if(!container) return;
  const thumbs = photos.map((p, i) => {
    const imgSrc = (p.status==='done' && p.fileId)
      ? `https://drive.google.com/thumbnail?id=${p.fileId}&sz=w200`
      : (p.dataUrl || '');
    const clickAction = (p.status==='done' && p.fileUrl)
      ? `window.open('${p.fileUrl}','_blank')`
      : (p.dataUrl ? `openLightbox('${p.dataUrl}')` : '');
    return `<div class="photo-thumb-wrap">
      ${imgSrc?`<img src="${imgSrc}" onclick="${clickAction}" style="cursor:pointer;">`:'<div style="width:100%;height:100%;background:var(--surface2);"></div>'}
      ${p.status!=='uploading'?`<button class="photo-del-btn" onclick="deletePhoto('${sid}','${zone}',${i})" title="移除">×</button>`:''}
      ${photoStatusBadge(p)}
    </div>`;
  }).join('');
  const canAdd = photos.length < maxCount;
  const addBtn = canAdd ? `
    <div class="photo-add-btn" onclick="triggerPhotoInput('${sid}','${zone}',${maxCount})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M20.5 7H18l-2-3H8L6 7H3.5A1.5 1.5 0 002 8.5v11A1.5 1.5 0 003.5 21h17a1.5 1.5 0 001.5-1.5v-11A1.5 1.5 0 0020.5 7z"/></svg>
      <span>新增照片</span>
    </div>` : '';
  container.innerHTML = thumbs + addBtn;
}
function deletePhoto(sid, zone, idx){
  const key = getPhotoCacheKey(sid, zone);
  if(!photoCache[key]) return;
  photoCache[key].splice(idx, 1);
  savePhotoMeta(sid, zone);
  refreshPhotoThumbs(sid, zone, 2);
}
function openLightbox(dataUrl){
  const lb = document.createElement('div');
  lb.className = 'photo-lightbox';
  lb.innerHTML = `<img src="${dataUrl}"><button class="photo-lightbox-close" onclick="this.parentNode.remove()">×</button>`;
  lb.onclick = function(e){ if(e.target===lb) lb.remove(); };
  document.body.appendChild(lb);
}

// ══ 照片上傳（POST base64 → GAS → Drive）══
const PHOTO_FOLDER_ID = '1SHI--kvSIul84RBgOC8efGtU7fuFmBTl';

async function uploadPhotoToGAS(cardId, zone, idx, file, dataUrl) {
  const ext  = (file.type || 'image/jpeg').split('/')[1] || 'jpg';
  const name = `${cardId}_${zone}_${idx+1}.${ext}`;
  const base64 = dataUrl.split(',')[1];
  if(!base64) throw new Error('base64 資料為空');
  return await gasPostPhoto({
    action:   'uploadPhoto',
    fileName: name,
    mimeType: 'image/jpeg',
    base64:   base64
  });
}

async function uploadAllPhotos(cardId) {
  const zones = ['外觀','配件','內部'];
  let successCount = 0, failCount = 0;
  for (const zone of zones) {
    const key    = getPhotoCacheKey(cardId, zone);
    const photos = photoCache[key] || [];
    for (let i = 0; i < photos.length; i++) {
      const p = photos[i];
      if (p.status === 'done') continue; // 已上傳跳過
      // 設為上傳中，刷新徽章
      p.status = 'uploading';
      refreshPhotoThumbs(cardId, zone, 2);
      try {
        const r = await uploadPhotoToGAS(cardId, zone, i, p.file, p.dataUrl);
        if (r && (r.success || r.fileId)) {
          p.status  = 'done';
          p.fileId  = r.fileId || '';
          p.fileUrl = r.fileUrl || '';
          successCount++;
        } else {
          p.status = 'fail';
          failCount++;
        }
      } catch(e) {
        p.status = 'fail';
        failCount++;
      }
      // 刷新縮圖顯示最新狀態
      refreshPhotoThumbs(cardId, zone, 2);
    }
  }
  if (failCount > 0) showToast(`⚠️ ${failCount} 張照片上傳失敗，其餘 ${successCount} 張成功`);
  else if (successCount > 0) showToast(`✓ ${successCount} 張照片已上傳至 Drive`);
}

// ══ 工具 ══
function setSyncState(st,lbl){
  const d=document.getElementById('sdot');
  d.className='sdot'+(st==='syncing'?' syncing':st==='err'?' err':'');
}
function setLBar(on){
  const b=document.getElementById('lbar');
  b.className='lbar'+(on?' on':' done');
  if(!on)setTimeout(()=>b.className='lbar',400);
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);
}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
