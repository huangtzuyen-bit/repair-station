<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小家電維修所</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f3f6;
  --surface:#fff;
  --surface2:#f0f1f5;
  --border:#e3e5ee;
  --border2:#c9ccd8;
  --text:#111318;        /* 黑色 */
  --text2:#2c2f3a;       /* 深黑 */
  --text3:#3a3d4a;       /* 灰→深黑 */
  --accent:#2DC76D;      /* Grass Green from palette */
  --accent-dark:#1fa057;
  --accent-bg:#edfaf3;
  --shadow:0 1px 3px rgba(28,35,80,.07),0 1px 8px rgba(28,35,80,.04);
  --shadow-md:0 4px 18px rgba(28,35,80,.11);
  --tab-h:64px;
}
body{
  background:var(--bg);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  font-size:16px;        /* 基本字體放大 */
  color:var(--text);
  min-height:100vh;
  padding-bottom:var(--tab-h);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ══ TOP BAR ══ */
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:8px 16px;
  display:flex;align-items:center;justify-content:flex-end;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
  min-height:52px;
}
.topbar-logo{display:flex;align-items:center;justify-content:flex-end;}
.topbar-logo-img{height:38px;width:auto;object-fit:contain;}

/* sync pill now inside repair-header */
.sync-pill{
  display:flex;align-items:center;gap:5px;
  font-size:13px;color:var(--text2);
  padding:5px 12px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
}
.sdot{width:7px;height:7px;border-radius:50%;background:#10b981;flex-shrink:0;animation:blink 2s infinite;}
.sdot.syncing{background:#f59e0b;animation:none;}
.sdot.err{background:#ef4444;animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tbtn{
  width:34px;height:34px;font-size:16px;font-weight:600;
  border-radius:50%;          /* ← 圓形，與 sync-pill 對齊 */
  cursor:pointer;font-family:inherit;
  border:1px solid var(--border2);background:var(--surface);color:var(--text2);
  transition:all .15s;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tbtn:active{transform:scale(.93);}

/* ══ PAGES ══ */
.page{display:none;}
.page.active{display:block;}

/* ══ BOTTOM TAB BAR ══ */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--tab-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:stretch;
  z-index:60;
  box-shadow:0 -2px 12px rgba(28,35,80,.07);
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;cursor:pointer;transition:color .15s;
  color:var(--text2);font-size:12px;font-weight:500;
  border:none;background:none;font-family:inherit;
  padding:6px 0 4px;
}
.tab svg{width:22px;height:22px;transition:all .15s;}
.tab.active{color:var(--accent);}
.tab.active svg{stroke:var(--accent);}
.tab:active{opacity:.7;}

/* ══ REPAIR PAGE ══ */
.repair-header{
  padding:14px 16px 12px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:var(--surface);
}
.repair-header h1{font-size:22px;font-weight:900;color:var(--text);font-family:'Noto Sans TC',sans-serif;letter-spacing:-.01em;}
.repair-header-right{display:flex;align-items:center;gap:8px;}

/* ── search bar ── */
.searchbar{
  background:var(--surface);border-bottom:0;
  padding:10px 14px 6px;
}
.sbox{
  display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:999px;
  padding:9px 16px;width:100%;
}
.sbox svg{width:14px;height:14px;color:var(--text2);flex-shrink:0;}
.sbox input{background:none;border:none;outline:none;font-size:14px;color:var(--text);font-family:inherit;flex:1;}
.sbox input::placeholder{color:var(--text2);}

/* ── chip filter ── */
.fbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:6px 14px 10px;
  display:flex;flex-wrap:wrap;gap:6px;
}
.chip{
  padding:6px 14px;font-size:13px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;flex-shrink:0;
}
.chip.on{color:#fff;border-color:transparent;}
.chip:hover:not(.on){background:var(--surface2);}

.board-wrap{overflow-x:auto;padding:14px 14px 24px;}
.board-wrap::-webkit-scrollbar{height:5px;}
.board-wrap::-webkit-scrollbar-track{background:var(--border);border-radius:10px;}
.board-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.board{display:flex;gap:12px;align-items:flex-start;min-width:max-content;}

.col{width:220px;flex-shrink:0;display:flex;flex-direction:column;}
.col-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;border-radius:10px 10px 0 0;
}
.cname{font-size:15px;font-weight:700;}
.ccnt{font-size:13px;font-weight:700;padding:2px 9px;border-radius:20px;background:rgba(255,255,255,.28);}
.col-body{border-radius:0 0 11px 11px;padding:9px 7px 11px;flex:1;min-height:70px;display:flex;flex-direction:column;gap:7px;}

.kcard{
  background:var(--surface);border:1px solid rgba(0,0,0,.06);
  border-radius:10px;padding:11px 12px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
  transition:box-shadow .15s,transform .12s;
}
.kcard:hover{box-shadow:0 4px 12px rgba(0,0,0,.11);transform:translateY(-2px);}
.kcard:active{transform:scale(.97);}
.kcard-inner{display:flex;align-items:center;gap:10px;}
.knum-circle{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0;
  font-family:'DM Mono',monospace;
}
.kcard-info{flex:1;min-width:0;}
.k-product{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.k-name{font-size:14px;color:var(--text2);font-weight:500;}
.empty-col{border:1.5px dashed rgba(0,0,0,.13);border-radius:9px;padding:18px 10px;text-align:center;font-size:12px;color:var(--text3);}

/* ══ MODAL ══ */
.moverlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(20,25,60,.45);backdrop-filter:blur(3px);
  display:flex;align-items:flex-end;justify-content:center;
  animation:fdi .18s ease;
}
@media(min-width:560px){.moverlay{align-items:center;padding:20px;}}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  animation:slu .22s cubic-bezier(.22,1,.36,1);
}
@media(min-width:560px){.modal{border-radius:16px;max-width:520px;max-height:88vh;}}
.m-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.mclose{
  width:30px;height:30px;border-radius:50%;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.m-body{padding:0 0 36px;}
.msec{padding:16px 20px 2px;}
.msec-title{
  display:flex;align-items:center;gap:7px;
  font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;
}
.trow{display:grid;grid-template-columns:90px 1fr;align-items:start;gap:4px 12px;padding:8px 0;}
.tl{font-size:13px;color:var(--text2);font-weight:500;padding-top:2px;line-height:1.5;}
.tv{font-size:15px;color:var(--text);line-height:1.5;word-break:break-word;font-weight:500;}
.msel,.mta,.minput{
  width:100%;padding:11px 13px;font-size:15px;
  border:1px solid var(--border2);border-radius:10px;
  background:var(--surface);color:var(--text);
  font-family:inherit;outline:none;
}

.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%);background:#1c1e2e;color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="lbar" id="lbar"></div>
<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-logo">
    <img src="https://lh3.googleusercontent.com/pw/AP1GczPrV8H6S-h7_hHInX6XoK_x4fA-K0uH-XpA-I-zVv8g_N4D2S2zN2v8=w1000-h300" class="topbar-logo-img" alt="Logo">
  </div>
</div>

<div id="repair-page" class="page active">
  <div class="repair-header">
    <h1>維修看板</h1>
    <div class="repair-header-right">
      <div class="sync-pill">
        <div id="sync-dot" class="sdot"></div>
        <span id="sync-text">已與雲端同步</span>
      </div>
      <button class="tbtn" onclick="fetchSheetData()" title="手動重新整理">↻</button>
    </div>
  </div>

  <div class="searchbar">
    <div class="sbox">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" id="k-search" placeholder="搜尋姓名、編號、品名..." oninput="renderBoard()">
    </div>
  </div>

  <div class="fbar" id="k-filter-bar">
    <div class="chip on" data-cat="all" onclick="setKFilter('all', this)" style="background:var(--text)">全部</div>
  </div>

  <div class="board-wrap">
    <div class="board" id="k-board"></div>
  </div>
</div>

<div id="modal-overlay" class="moverlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="m-head">
      <div id="m-title-area" class="m-title">物件詳情</div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body" id="m-body"></div>
  </div>
</div>

<div class="tabbar">
  <div class="tab active">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    <span>維修看板</span>
  </div>
</div>

<script>
let allCards = [];
let currentKFilter = 'all';

const stgList = ['未報到', '已報到等待維修', '維修中', '待領取', '已領取', '轉診或待確認'];
const stgMeta = {
  '未報到': { color: '#64748b' },
  '已報到等待維修': { color: '#f59e0b' },
  '維修中': { color: '#3b82f6' },
  '待領取': { color: '#8b5cf6' },
  '已領取': { color: '#10b981' },
  '轉診或待確認': { color: '#ef4444' }
};

// --- Google Apps Script 連接 ---
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhcnu7yFewxa5AokNDGeO7s6Z2qjxAhqYRVSCn5Gbvf8SjgNhAieosR7muXyTq2h-4/exec'; // 請填入您的 Web App URL

async function fetchSheetData() {
  setSyncState('syncing');
  try {
    const response = await fetch(SCRIPT_URL + "?action=read");
    const data = await response.json();
    
    // 資料處理邏輯：根據需求 1, 2, 3 修改
    allCards = data.map(row => {
      const rowStage = (row[1] || '').toString().trim();  // B欄：流程階段
      const rowRegNum = (row[3] || '').toString().trim(); // D欄：編號

      let finalStage = rowStage;

      // 需求 2：未報到區域判定條件為 D欄"編號" 空白
      if (rowRegNum === "") {
        finalStage = '未報到';
      } 
      // 需求 1：如果 B欄"流程階段"空白但 D欄"編號"有數字，移動到"已報到等待維修"
      else if (rowStage === "" && rowRegNum !== "") {
        finalStage = '已報到等待維修';
      }
      // 需求 3：如果 B欄為 "取消/轉診/退回"，移動到 "轉診或待確認"
      else if (rowStage === "取消/轉診/退回") {
        finalStage = '轉診或待確認';
      }

      return {
        id: (row[0] || '').toString(),
        stage: finalStage,
        name: (row[2] || '').toString(),
        regNum: rowRegNum,
        phone: (row[4] || '').toString(),
        phone3: (row[5] || '').toString(),
        endOfProduct: (row[6] || '').toString(),
        item: (row[7] || '').toString(),
        subItem: (row[8] || '').toString(),
        bigCat: (row[9] || '').toString(),
        brand: (row[10] || '').toString(),
        model: (row[11] || '').toString(),
        accessories: (row[12] || '').toString(),
        mfgDate: (row[13] || '').toString(),
        price: (row[14] || '').toString(),
        faultDesc: (row[15] || '').toString(),
        itemNote: (row[16] || '').toString(),
        noteTag: (row[17] || '').toString(),
        opened: (row[18] || '').toString(),
        extraNote: (row[19] || '').toString(),
        repairResult: (row[20] || '').toString(),
        repairResultDesc: (row[21] || '').toString(),
        repairNote: (row[22] || '').toString(),
        repairman: (row[23] || '').toString(),
        partCost: (row[24] || '').toString(),
        donationFee: (row[25] || '').toString(),
        ecoContrib: (row[26] || '').toString()
      };
    });

    updateFilterBar();
    renderBoard();
    setSyncState('done');
  } catch (e) {
    console.error(e);
    setSyncState('error');
  }
}

function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  dot.className = 'sdot ' + (state === 'syncing' ? 'syncing' : (state === 'error' ? 'err' : ''));
  txt.innerText = state === 'syncing' ? '同步中...' : (state === 'error' ? '連線錯誤' : '已與雲端同步');
}

function updateFilterBar() {
  const cats = [...new Set(allCards.map(c => c.bigCat))].filter(Boolean);
  const bar = document.getElementById('k-filter-bar');
  bar.innerHTML = `<div class="chip ${currentKFilter==='all'?'on':''}" data-cat="all" onclick="setKFilter('all', this)" style="${currentKFilter==='all'?'background:var(--text)':''}">全部</div>`;
  cats.forEach(c => {
    const active = currentKFilter === c;
    bar.innerHTML += `<div class="chip ${active?'on':''}" onclick="setKFilter('${c}', this)" style="${active?'background:var(--text)':''}">${c}</div>`;
  });
}

function setKFilter(cat, el) {
  currentKFilter = cat;
  document.querySelectorAll('#k-filter-bar .chip').forEach(c => {
    c.classList.remove('on');
    c.style.background = '';
  });
  el.classList.add('on');
  el.style.background = 'var(--text)';
  renderBoard();
}

function renderBoard() {
  const term = document.getElementById('k-search').value.toLowerCase();
  const board = document.getElementById('k-board');
  board.innerHTML = '';

  stgList.forEach(stg => {
    const cards = allCards.filter(c => {
      const matchStg = c.stage === stg;
      const matchCat = currentKFilter === 'all' || c.bigCat === currentKFilter;
      const matchTerm = !term || c.name.toLowerCase().includes(term) || c.regNum.toLowerCase().includes(term) || c.item.toLowerCase().includes(term);
      return matchStg && matchCat && matchTerm;
    });

    const col = document.createElement('div');
    col.className = 'col';
    const color = stgMeta[stg].color;
    col.innerHTML = `
      <div class="col-hd" style="background:${color}; color:#fff">
        <span class="cname">${stg}</span>
        <span class="ccnt">${cards.length}</span>
      </div>
      <div class="col-body" id="col-${stg}"></div>
    `;
    board.appendChild(col);

    const body = col.querySelector('.col-body');
    if (cards.length === 0) {
      body.innerHTML = `<div class="empty-col">暫無案件</div>`;
    } else {
      cards.forEach(c => {
        const card = document.createElement('div');
        card.className = 'kcard';
        card.onclick = () => showCardDetail(c);
        card.innerHTML = `
          <div class="kcard-inner">
            <div class="knum-circle" style="background:${color}15; color:${color}">${c.regNum || '---'}</div>
            <div class="kcard-info">
              <div class="k-product">${c.item || '未填寫品名'}</div>
              <div class="k-name">${c.name}</div>
            </div>
          </div>
        `;
        body.appendChild(card);
      });
    }
  });
}

function showCardDetail(c) {
  const overlay = document.getElementById('modal-overlay');
  const body = document.getElementById('m-body');
  
  body.innerHTML = `
    <div class="msec">
      <div class="trow"><div class="tl">收件編號</div><div class="tv bold">${c.regNum || '無'}</div></div>
      <div class="trow"><div class="tl">委託人</div><div class="tv">${c.name}</div></div>
      <div class="trow"><div class="tl">品名</div><div class="tv">${c.item} / ${c.brand}</div></div>
      <div class="trow"><div class="tl">故障描述</div><div class="tv">${c.faultDesc}</div></div>
      <div class="trow">
        <div class="tl">當前階段</div>
        <div class="tv">
          <select class="msel" onchange="updateStage('${c.id}', this.value)">
            ${stgList.map(s => `<option value="${s}" ${s===c.stage?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>
  `;
  overlay.style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

async function updateStage(id, newStage) {
  // 這裡實作將狀態回傳至 Google Sheet 的邏輯
  showToast("正在更新階段...");
  try {
    const response = await fetch(`${SCRIPT_URL}?action=update&id=${id}&stage=${encodeURIComponent(newStage)}`);
    if (response.ok) {
      showToast("更新成功");
      fetchSheetData();
    }
  } catch (e) {
    showToast("更新失敗，請檢查網路");
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.onload = fetchSheetData;
</script>

</body>
</html>
